<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — A10: Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --shadow:0 2px 12px rgba(61,44,46,0.06);
  --shadow2:0 6px 24px rgba(61,44,46,0.10);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --cycle-accent:#F4A7B9;--cycle-accent-rgb:244,167,185;
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.scene-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill-tag{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill-tag.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill-tag.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;background:var(--bg);border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;background:var(--bg);}
.statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;}
.stime{font-size:15px;font-weight:700;color:var(--text);}
.sicons{display:flex;gap:5px;color:var(--text2);font-size:11px;}
.dyna{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:rgba(61,44,46,0.10);border-radius:999px;z-index:30;pointer-events:none;}
.a-screen .dyna{display:none;}

/* ── SCROLL BODY ── */
.scroll-body{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 20px 100px;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.scroll-body::-webkit-scrollbar{display:none;}
.scroll-body>*{flex-shrink:0;}
.ios-screen .scroll-body{top:0;padding-top:60px;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUpBounce{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
@keyframes glowSoft{0%,100%{opacity:0.5;transform:scale(0.94);}50%{opacity:0.8;transform:scale(1.02);}}
@keyframes breatheRing{0%,100%{transform:scale(1);opacity:0.15;}50%{transform:scale(1.06);opacity:0.25;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

.anim-el{opacity:0;animation:fadeUpBounce 0.50s cubic-bezier(0.34,1.56,0.64,1) both;}
.ios-screen .anim-el{animation-name:fadeUp;animation-timing-function:cubic-bezier(0.32,0.72,0,1);}

/* ── BLOBS ── */
.blob{position:absolute;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);transition:background 0.7s,opacity 0.7s;}
.blob1{width:300px;height:300px;top:-80px;right:-60px;background:var(--plant-color);opacity:0.07;}
.blob2{width:220px;height:220px;bottom:200px;left:-50px;background:var(--brand-real);opacity:0.04;}
.ios-screen .blob1{opacity:0.05;filter:blur(90px);}

/* ═══════════════════════════════════════
   PLANT HERO — emotional center
   ═══════════════════════════════════════ */
.profile-hero{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:6px;z-index:1;position:relative;
  padding-top:4px;
}
.hero-plant-wrap{
  width:120px;height:120px;position:relative;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:8px;
}
.hero-plant-wrap::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  background:radial-gradient(circle, rgba(var(--plant-color-rgb),0.12) 0%, transparent 70%);
  animation:breatheRing 4s ease-in-out infinite;
  transition:background 0.7s;
}
.hero-plant-svg{width:100%;height:100%;}
.hero-plant-svg svg{width:100%;height:100%;}

.hero-name{font-size:22px;font-weight:800;color:var(--text);line-height:1.2;}
.hero-greeting{
  font-size:13.5px;font-weight:500;color:var(--plant-color);margin-top:3px;
  text-align:center;max-width:260px;line-height:1.4;
  transition:color 0.7s;
}

/* ═══════════════════════════════════════
   JOURNEY STATS — emotional progress
   ═══════════════════════════════════════ */
.journey-stats{
  display:flex;gap:8px;margin:18px 0 20px;z-index:1;position:relative;width:100%;
}
.jstat{
  flex:1;text-align:center;padding:14px 6px 12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.ios-screen .jstat{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.82);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.jstat-num{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:24px;color:var(--plant-color);line-height:1;
  transition:color 0.7s;
}
.jstat-label{font-size:10px;font-weight:600;color:var(--text2);margin-top:4px;line-height:1.25;}

/* ═══════════════════════════════════════
   PLANT IDENTITY CARD — who she is
   ═══════════════════════════════════════ */
.plant-id-card{
  background:var(--card);border:1.5px solid rgba(var(--plant-color-rgb),0.15);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:16px;margin-bottom:16px;z-index:1;position:relative;
  overflow:hidden;
}
.ios-screen .plant-id-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.plant-id-card::after{
  content:'';position:absolute;top:0;right:0;width:90px;height:90px;
  background:radial-gradient(circle at top right, rgba(var(--plant-color-rgb),0.06), transparent 70%);
  pointer-events:none;transition:background 0.7s;
}
.pid-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.pid-mini{
  width:52px;height:52px;border-radius:16px;flex-shrink:0;
  background:rgba(var(--plant-color-rgb),0.08);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.7s;
}
.pid-mini svg{width:40px;height:40px;}
.pid-info{flex:1;}
.pid-name{font-size:15px;font-weight:700;color:var(--text);}
.pid-tagline{font-family:'Instrument Serif',serif;font-style:italic;font-size:13px;color:var(--plant-color);transition:color 0.7s;margin-top:1px;}
.pid-actions{display:flex;gap:8px;}
.pid-action{
  flex:1;padding:10px 8px;border-radius:14px;text-align:center;
  background:rgba(var(--plant-color-rgb),0.06);
  cursor:pointer;transition:all 0.25s;
}
.pid-action:active{transform:scale(0.97);}
.pid-action-icon{font-size:18px;line-height:1;margin-bottom:3px;}
.pid-action-label{font-size:10.5px;font-weight:600;color:var(--text2);}

/* ═══════════════════════════════════════
   CYCLE CARD — phase awareness
   ═══════════════════════════════════════ */
.cycle-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:16px;margin-bottom:16px;z-index:1;position:relative;
  overflow:hidden;
}
.ios-screen .cycle-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.cycle-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cycle-wheel-wrap{width:48px;height:48px;flex-shrink:0;}
.cycle-wheel-wrap svg{width:100%;height:100%;}
.cycle-info{flex:1;}
.cycle-phase{font-size:14px;font-weight:700;color:var(--text);}
.cycle-day{font-size:12px;color:var(--text2);margin-top:1px;}
.cycle-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  background:var(--cycle-accent);
  box-shadow:0 0 0 3px rgba(var(--cycle-accent-rgb),0.15);
  transition:all 0.7s;
}
.cycle-phases-row{display:flex;gap:4px;}
.cphase-item{
  flex:1;padding:8px 4px;border-radius:12px;text-align:center;
  background:rgba(var(--plant-color-rgb),0.04);transition:all 0.7s;
}
.cphase-item.active{background:rgba(var(--cycle-accent-rgb),0.10);border:1px solid rgba(var(--cycle-accent-rgb),0.15);}
.cphase-name{font-size:9.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.03em;}
.cphase-item.active .cphase-name{color:var(--cycle-accent);}
.cphase-days{font-size:9px;color:var(--text3);margin-top:1px;}

/* ═══════════════════════════════════════
   SECTION GROUPS
   ═══════════════════════════════════════ */
.section-group{margin-bottom:16px;z-index:1;position:relative;}
.section-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text3);margin-bottom:8px;padding-left:4px;
}
.section-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;
}
.ios-screen .section-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}

/* ── ROW ITEMS ── */
.row-item{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;position:relative;
  cursor:pointer;transition:background 0.2s;
}
.row-item:not(:last-child)::after{
  content:'';position:absolute;bottom:0;left:52px;right:16px;
  height:1px;background:var(--border);
}
.row-item:active{background:rgba(var(--plant-color-rgb),0.04);}
.row-icon{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:background 0.7s;
}
.row-info{flex:1;min-width:0;}
.row-title{font-size:13px;font-weight:600;color:var(--text);}
.row-desc{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.row-value{font-size:11.5px;font-weight:600;color:var(--text2);}
.row-arrow{font-size:16px;color:var(--text3);}

/* ── TOGGLE ── */
.toggle{
  width:42px;height:25px;border-radius:13px;position:relative;cursor:pointer;
  background:var(--text3);transition:background 0.3s;flex-shrink:0;
}
.toggle.on{background:var(--plant-color);transition:background 0.7s;}
.toggle::after{
  content:'';position:absolute;top:2.5px;left:2.5px;
  width:20px;height:20px;border-radius:50%;background:white;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.toggle.on::after{transform:translateX(17px);}

/* ═══════════════════════════════════════
   PREMIUM BADGE (small, subtle)
   ═══════════════════════════════════════ */
/* premium badge removed — single tier */

/* ═══════════════════════════════════════
   LOGOUT + VERSION
   ═══════════════════════════════════════ */
.logout-btn{
  text-align:center;padding:12px;font-size:13px;font-weight:600;
  color:var(--brand-real-deep);cursor:pointer;
  margin-top:4px;z-index:1;position:relative;
}
.version-footer{
  text-align:center;font-size:10.5px;color:var(--text3);
  margin-top:6px;z-index:1;position:relative;padding-bottom:8px;
}
.version-footer em{font-family:'Instrument Serif',serif;font-style:italic;font-size:11.5px;color:var(--text3);}

/* ── FAB ── */
.fab-pause{
  position:absolute;bottom:80px;right:20px;z-index:15;
  width:48px;height:48px;border-radius:50%;
  background:var(--brand-warning);color:white;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;
  box-shadow:0 4px 16px rgba(255,208,122,0.35);
  cursor:pointer;transition:transform 0.2s;
}
.ios-screen .fab-pause{
  bottom:90px;
  backdrop-filter:blur(20px) saturate(180%);
  background:rgba(255,208,122,0.88);
  border:1px solid rgba(255,255,255,0.30);
  box-shadow:0 1px 0 rgba(255,255,255,0.30) inset,0 4px 20px rgba(255,208,122,0.28);
}

/* ── BOTTOM NAV ── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;z-index:20;pointer-events:none;}
.a-screen .bottom-nav{
  height:68px;background:var(--card);border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(61,44,46,0.05);
  display:flex;align-items:center;justify-content:space-around;padding:0 8px;pointer-events:auto;
}
.a-screen .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:16px;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.a-screen .nav-item.active{background:rgba(var(--plant-color-rgb),0.10);}
.a-screen .nav-item .nav-icon{font-size:20px;line-height:1;}
.a-screen .nav-item .nav-label{font-size:10px;font-weight:600;color:var(--text2);}
.a-screen .nav-item.active .nav-label{color:var(--plant-color);font-weight:700;}
.ios-screen .bottom-nav{
  bottom:20px;left:20px;right:20px;height:56px;
  background:rgba(255,255,255,0.72);backdrop-filter:blur(24px) saturate(180%);
  border-radius:999px;border:1px solid rgba(255,255,255,0.45);
  box-shadow:0 8px 32px rgba(61,44,46,0.10),0 1px 0 rgba(255,255,255,0.60) inset;
  display:flex;align-items:center;justify-content:space-around;padding:0 12px;pointer-events:auto;
}
.ios-screen .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 10px;cursor:pointer;transition:all 0.25s;}
.ios-screen .nav-item .nav-icon{font-size:19px;line-height:1;}
.ios-screen .nav-item .nav-label{font-size:9.5px;font-weight:600;color:var(--text2);}
.ios-screen .nav-item.active .nav-label{color:var(--plant-color);font-weight:700;}
.nav-item.active .nav-icon{position:relative;}
.nav-item.active .nav-icon::after{
  content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--plant-color);transition:background 0.7s;
}

@media(max-width:820px){.stage{flex-direction:column;align-items:center;}}
</style>
</head>
<body>
<div class="studio">
  <div class="studio-header">
    <div class="brand-eyebrow">Brota</div>
    <div class="brand-title">Perfil<em>Tela de relacionamento, nao de configuracao</em></div>
    <div class="brand-sub">Planta hero com SVG completo (pot + face + sparkles). Stats emocionais. Identidade da planta. Ciclo visual com fases. Protecao e notificacoes. Assinatura por ultimo. Ref: Finch profile, Gentler Streak premium badge, Flo cycle wheel.</div>
  </div>

  <div class="controls">
    <button class="state-btn active" onclick="setPlant('s1',this)">Lavanda</button>
    <button class="state-btn" onclick="setPlant('s2',this)">Girassol</button>
    <button class="state-btn" onclick="setPlant('s3',this)">Cacto</button>
    <button class="state-btn" onclick="setPlant('s4',this)">Cerejeira</button>
    <button class="state-btn" onclick="setPlant('s5',this)">Lotus</button>
    <div class="state-sep"></div>
    <button class="state-btn scene-btn active" onclick="setScene('normal',this)">Normal</button>
    <button class="state-btn scene-btn" onclick="setScene('luteal',this)">Luteal</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
var plants = {
  s1:{name:'Ana',  plant:'Lavanda',   color:'#C4B0E0',rgb:'196,176,224', tagline:'"Quero paz"', tone:'Suave, sussurrada'},
  s2:{name:'Bia',  plant:'Girassol',  color:'#F2CE6B',rgb:'242,206,107', tagline:'"Quero alegria"', tone:'Otimista, gentil'},
  s3:{name:'Carol',plant:'Cacto',     color:'#8CC5A0',rgb:'140,197,160', tagline:'"Quero ser real"', tone:'Direto, humor seco'},
  s4:{name:'Dani', plant:'Cerejeira', color:'#F2B5C4',rgb:'242,181,196', tagline:'"Quero me aceitar"', tone:'Poetico, reflexivo'},
  s5:{name:'Eva',  plant:'Lotus',     color:'#D4B8D4',rgb:'212,184,212', tagline:'"Quero descansar"', tone:'Sabio, sereno'}
};

/* ── FACES ── */
var FACE_HAPPY = ''
  +'<ellipse cx="36" cy="38" rx="2.2" ry="2.5" fill="#4A3728"><animate attributeName="ry" values="2.5;0.3;2.5" dur="3.5s" begin="1.5s" repeatCount="indefinite"/></ellipse>'
  +'<ellipse cx="44" cy="38" rx="2.2" ry="2.5" fill="#4A3728"><animate attributeName="ry" values="2.5;0.3;2.5" dur="3.5s" begin="1.5s" repeatCount="indefinite"/></ellipse>'
  +'<circle cx="37" cy="37" r="1" fill="white" opacity="0.95"/>'
  +'<circle cx="45" cy="37" r="1" fill="white" opacity="0.95"/>'
  +'<path d="M37 43C38.5 45.5 41.5 45.5 43 43" stroke="#4A3728" stroke-width="1.5" stroke-linecap="round" fill="none"><animate attributeName="d" values="M37 43C38.5 45.5 41.5 45.5 43 43;M37.5 43.5C38.5 45 41.5 45 42.5 43.5;M37 43C38.5 45.5 41.5 45.5 43 43" dur="4s" begin="3s" repeatCount="indefinite"/></path>'
  +'<circle cx="32.5" cy="41" r="3" fill="#F4A7B9" opacity="0.18"><animate attributeName="opacity" values="0.18;0.32;0.18" dur="3s" repeatCount="indefinite"/></circle>'
  +'<circle cx="47.5" cy="41" r="3" fill="#F4A7B9" opacity="0.18"><animate attributeName="opacity" values="0.18;0.32;0.18" dur="3s" repeatCount="indefinite"/></circle>';

var SPARKLES = ''
  +'<circle cx="18" cy="18" r="1.5" fill="white"><animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/><animate attributeName="r" values="1.5;2;1.5" dur="2.5s" repeatCount="indefinite"/></circle>'

/* ═══════════════════════════════════════
   CYCLE WHEEL SVG
   ═══════════════════════════════════════ */
function cycleWheelSVG(activeIdx){
  var phases = [
    {color:'rgba(242,213,213,0.7)', label:'Menstrual'},
    {color:'rgba(244,167,185,0.7)', label:'Folicular'},
    {color:'rgba(255,219,168,0.6)', label:'Ovulacao'},
    {color:'rgba(196,176,224,0.65)', label:'Luteal'}
  ];
  var arcs = [{s:0,e:5},{s:5,e:13},{s:13,e:16},{s:16,e:28}];
  var svg = '<svg viewBox="0 0 48 48">';
  arcs.forEach(function(a,i){
    var startAngle = (a.s/28)*360 - 90;
    var endAngle = (a.e/28)*360 - 90;
    var large = (endAngle-startAngle) > 180 ? 1 : 0;
    var r = 18, cx = 24, cy = 24;
    var x1 = cx+r*Math.cos(startAngle*Math.PI/180);
    var y1 = cy+r*Math.sin(startAngle*Math.PI/180);
    var x2 = cx+r*Math.cos(endAngle*Math.PI/180);
    var y2 = cy+r*Math.sin(endAngle*Math.PI/180);
    var isActive = i === activeIdx;
    var sw = isActive ? '5.5' : '4';
    var op = isActive ? '1' : '0.35';
    svg += '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+phases[i].color+'" stroke-width="'+sw+'" stroke-linecap="round" opacity="'+op+'"/>';
  });
  svg += '</svg>';
  return svg;
}

function setPlant(key,btn){
  currentPlant = plants[key];
  document.querySelectorAll('.state-btn:not(.scene-btn)').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}
function setScene(scene,btn){
  currentScene = scene;
  document.querySelectorAll('.scene-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function applyState(){
  var s = currentPlant;
  var sc = scenes[currentScene];
  var r = document.documentElement;
  var isLuteal = currentScene === 'luteal';

  r.style.setProperty('--plant-color',s.color);
  r.style.setProperty('--plant-color-rgb',s.rgb);
  r.style.setProperty('--cycle-accent', sc.cycleAccent);
  r.style.setProperty('--cycle-accent-rgb', sc.cycleAccentRgb);

  var heroSvg = plantSVGs[s.plant].replace(/__CLR__/g, s.color);
  var miniSvg = miniSVGs[s.plant].replace(/__CLR__/g, s.color);

  ['a','i'].forEach(function(p){
    /* Hero plant */
    var heroPlant = document.getElementById(p+'-hero-plant');
    if(heroPlant) heroPlant.innerHTML = heroSvg;

    /* Name & greeting */
    var hname = document.getElementById(p+'-hname');
    if(hname) hname.textContent = s.name;
    var hgreet = document.getElementById(p+'-hgreet');
    if(hgreet) hgreet.textContent = sc.greeting[s.plant];

    /* Stats */
    var sdays = document.getElementById(p+'-sdays');
    if(sdays) sdays.textContent = sc.stats.days;
    var smoods = document.getElementById(p+'-smoods');
    if(smoods) smoods.textContent = sc.stats.moods;
    var scares = document.getElementById(p+'-scares');
    if(scares) scares.textContent = sc.stats.cares;

    /* Plant ID */
    var pidmini = document.getElementById(p+'-pidmini');
    if(pidmini) pidmini.innerHTML = miniSvg;
    var pidname = document.getElementById(p+'-pidname');
    if(pidname) pidname.textContent = s.plant+' — '+s.tone;
    var pidtag = document.getElementById(p+'-pidtag');
    if(pidtag) pidtag.textContent = s.tagline;

    /* Cycle */
    var cwheel = document.getElementById(p+'-cwheel');
    if(cwheel) cwheel.innerHTML = cycleWheelSVG(sc.activePhase);
    var cphase = document.getElementById(p+'-cphase');
    if(cphase) cphase.textContent = 'Fase '+sc.phase;
    var cday = document.getElementById(p+'-cday');
    if(cday) cday.textContent = sc.phaseDay+' do ciclo';
    var cdot = document.getElementById(p+'-cdot');
    if(cdot) cdot.style.background = sc.cycleAccent;

    /* Phase items */
    var cphases = document.getElementById(p+'-cphases');
    if(cphases){
      var items = cphases.querySelectorAll('.cphase-item');
      items.forEach(function(item,i){
        item.classList.toggle('active', i === sc.activePhase);
      });
    }

    /* Mirror freq */
    var mfreq = document.getElementById(p+'-mfreq');
    if(mfreq) mfreq.textContent = sc.mirrorFreq;
  });
}
