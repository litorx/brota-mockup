<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — A7: Pause</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --dark-bg:#1A1520;--dark-surface:#241E2C;
  --dark-text:#EDE6F0;--dark-text2:rgba(237,230,240,0.45);
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.scene-btn.active{background:var(--brand-warning);border-color:var(--brand-warning);color:var(--text);}
.state-btn.phase-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);color:white;}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}

/* ── FAB PREVIEW ── */
.fab-preview{position:absolute;inset:0;background:var(--bg);}
.fab-preview .fake-home{
  position:absolute;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
}
.fake-home .fake-plant{
  width:100px;height:100px;
  border-radius:50%;
  background:radial-gradient(circle at 40% 35%, rgba(var(--plant-color-rgb),0.18), rgba(var(--plant-color-rgb),0.06));
  display:flex;align-items:center;justify-content:center;
  animation:fakePlantBreathe 4s ease-in-out infinite;
}
.fake-home .fake-plant svg{width:60px;height:60px;opacity:0.4;}
.fake-home .fake-label{font-size:12px;font-weight:600;color:var(--text3);text-align:center;line-height:1.5;}
.fake-home .fake-cards{display:flex;flex-direction:column;gap:8px;margin-top:8px;width:80%;opacity:0.2;}
.fake-home .fake-card{height:28px;background:var(--border);border-radius:12px;}

/* FAB button */
.fab-btn{
  position:absolute;bottom:100px;right:24px;
  width:58px;height:58px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(var(--plant-color-rgb),1), rgba(var(--plant-color-rgb),0.75));
  box-shadow:
    0 4px 20px rgba(var(--plant-color-rgb),0.4),
    0 2px 8px rgba(0,0,0,0.1),
    inset 0 1px 0 rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:20;
  animation:fabPulse 3s ease-in-out infinite;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.fab-btn:hover{transform:scale(1.1);}
.fab-btn:active{transform:scale(0.93);}
.fab-btn .fab-icon{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}
.fab-btn .fab-icon svg{width:100%;height:100%;}
.ios-screen .fab-btn{
  background:rgba(var(--plant-color-rgb),0.7);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  backdrop-filter:blur(24px) saturate(180%);
  box-shadow:0 4px 16px rgba(var(--plant-color-rgb),0.3),inset 0 1px 0 rgba(255,255,255,0.2);
}

/* ── DARK COCOON ── */
.pause-screen{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 40%, var(--dark-surface), var(--dark-bg) 70%);
  overflow:hidden;
}

/* Ambient stars */
.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.star{
  position:absolute;border-radius:50%;
  background:rgba(var(--plant-color-rgb),0.4);
  animation:starTwinkle var(--dur) ease-in-out infinite;
  animation-delay:var(--delay);
}

/* Status bar dark */
.statusbar-dark{
  position:absolute;top:0;left:0;right:0;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:10;pointer-events:none;
}
.statusbar-dark .stime{font-size:15px;font-weight:700;color:var(--dark-text);}
.statusbar-dark .sicons{display:flex;gap:5px;color:var(--dark-text2);font-size:11px;}
.dyna-dark{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  width:118px;height:34px;background:rgba(255,255,255,0.06);
  border-radius:999px;z-index:30;pointer-events:none;
}
.a-screen .dyna-dark{display:none;}

/* Close */
.pause-close{
  position:absolute;top:60px;right:24px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--dark-text2);font-size:18px;
  transition:all 0.25s;z-index:20;
}
.pause-close:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15);}
.ios-screen .pause-close{
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  background:rgba(255,255,255,0.07);
}

/* ── CONTENT WRAPPERS (absolute center in safe zone) ── */
.breath-content,.grounding-content,.done-content{
  position:absolute;
  top:96px;left:0;right:0;bottom:72px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 32px;
  z-index:5;
}

/* ── PLANT SPEECH ── */
.pause-plant-name{
  font-size:11px;font-weight:700;
  color:rgba(var(--plant-color-rgb),0.55);
  letter-spacing:0.06em;text-transform:uppercase;
  margin-bottom:6px;text-align:center;
  opacity:0;animation:fadeUpSoft 0.7s ease-out 0.3s forwards;
}
.pause-speech{
  font-size:15.5px;font-weight:600;
  color:var(--dark-text);text-align:center;
  max-width:260px;line-height:1.55;
  margin-bottom:32px;
  opacity:0;animation:fadeUpSoft 0.7s ease-out 0.5s forwards;
}
.pause-speech em{
  font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;
  color:rgba(var(--plant-color-rgb),0.9);
}

/* ── BREATHING ORB ── */
.breath-orb-area{
  position:relative;
  width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:28px;
  flex-shrink:0;
}

/* Outer rings */
.breath-ring{
  position:absolute;border-radius:50%;
  border:1.5px solid rgba(var(--plant-color-rgb),0.12);
  transition:all 4s ease-in-out;
}
.breath-ring.r1{width:200px;height:200px;}
.breath-ring.r2{width:172px;height:172px;border-color:rgba(var(--plant-color-rgb),0.18);}
.breath-ring.r3{width:148px;height:148px;border-color:rgba(var(--plant-color-rgb),0.25);}

/* Ambient glow behind orb */
.breath-glow{
  position:absolute;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle, rgba(var(--plant-color-rgb),0.15), transparent 70%);
  filter:blur(20px);
  transition:all 4s ease-in-out;
  pointer-events:none;
}

/* Core orb */
.breath-core{
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle at 38% 32%,
    rgba(var(--plant-color-rgb),0.55),
    rgba(var(--plant-color-rgb),0.25) 60%,
    rgba(var(--plant-color-rgb),0.12) 100%);
  box-shadow:
    0 0 40px rgba(var(--plant-color-rgb),0.2),
    0 0 80px rgba(var(--plant-color-rgb),0.08),
    inset 0 -4px 12px rgba(0,0,0,0.15),
    inset 0 2px 6px rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  transition:all 4s ease-in-out;
  z-index:3;
  position:relative;
}
/* Specular highlight */
.breath-core::before{
  content:'';position:absolute;
  top:14%;left:28%;
  width:30%;height:20%;border-radius:50%;
  background:radial-gradient(ellipse, rgba(255,255,255,0.25), transparent);
  transition:all 4s ease-in-out;
}
/* Plant inside the orb */
.breath-core .core-plant{
  width:50px;height:50px;
  opacity:0.7;
  transition:all 4s ease-in-out;
}
.breath-core .core-plant svg{width:100%;height:100%;}

/* ── BREATH STATES ── */
.breath-core.inhale{
  width:130px;height:130px;
  background:radial-gradient(circle at 38% 32%,
    rgba(var(--plant-color-rgb),0.7),
    rgba(var(--plant-color-rgb),0.35) 60%,
    rgba(var(--plant-color-rgb),0.18) 100%);
  box-shadow:
    0 0 60px rgba(var(--plant-color-rgb),0.35),
    0 0 120px rgba(var(--plant-color-rgb),0.12),
    inset 0 -4px 12px rgba(0,0,0,0.1),
    inset 0 2px 6px rgba(255,255,255,0.15);
}
.breath-core.inhale .core-plant{width:58px;height:58px;opacity:0.9;}
.breath-core.hold{
  width:130px;height:130px;
  background:radial-gradient(circle at 38% 32%,
    rgba(var(--plant-color-rgb),0.7),
    rgba(var(--plant-color-rgb),0.35) 60%,
    rgba(var(--plant-color-rgb),0.18) 100%);
  box-shadow:
    0 0 55px rgba(var(--plant-color-rgb),0.3),
    0 0 100px rgba(var(--plant-color-rgb),0.1),
    inset 0 -4px 12px rgba(0,0,0,0.1),
    inset 0 2px 6px rgba(255,255,255,0.15);
  transition:all 0.3s;
}
.breath-core.hold .core-plant{width:58px;height:58px;opacity:0.9;transition:all 0.3s;}
.breath-core.exhale{
  width:90px;height:90px;
  box-shadow:
    0 0 30px rgba(var(--plant-color-rgb),0.12),
    0 0 60px rgba(var(--plant-color-rgb),0.05),
    inset 0 -4px 12px rgba(0,0,0,0.15),
    inset 0 2px 6px rgba(255,255,255,0.12);
}
.breath-core.exhale .core-plant{width:50px;height:50px;opacity:0.7;}

/* Ring expansion with breathing */
.inhale-rings .r1{width:220px;height:220px;border-color:rgba(var(--plant-color-rgb),0.2);}
.inhale-rings .r2{width:192px;height:192px;border-color:rgba(var(--plant-color-rgb),0.28);}
.inhale-rings .r3{width:164px;height:164px;border-color:rgba(var(--plant-color-rgb),0.36);}
.inhale-rings .breath-glow{width:240px;height:240px;filter:blur(28px);background:radial-gradient(circle, rgba(var(--plant-color-rgb),0.22), transparent 70%);}
.exhale-rings .r1{width:190px;height:190px;border-color:rgba(var(--plant-color-rgb),0.08);}
.exhale-rings .r2{width:162px;height:162px;border-color:rgba(var(--plant-color-rgb),0.12);}
.exhale-rings .r3{width:138px;height:138px;border-color:rgba(var(--plant-color-rgb),0.18);}
.exhale-rings .breath-glow{width:170px;height:170px;filter:blur(16px);background:radial-gradient(circle, rgba(var(--plant-color-rgb),0.1), transparent 70%);}

/* ── INSTRUCTION + COUNTER ── */
.breath-instruction{
  font-size:18px;font-weight:700;color:var(--dark-text);
  text-align:center;letter-spacing:0.03em;
  min-height:24px;
  transition:opacity 0.4s;
}
.breath-counter{
  font-family:'Instrument Serif',serif;
  font-size:40px;font-style:italic;
  color:rgba(var(--plant-color-rgb),0.85);
  text-align:center;min-height:48px;
  margin-top:4px;
}

/* ── FLOATING PARTICLES ── */
.particles{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.particle{
  position:absolute;border-radius:50%;
  background:rgba(var(--plant-color-rgb),0.35);
  animation:particleFloat var(--dur) ease-in-out infinite;
  animation-delay:var(--delay);
}

/* ── STATS ── */
.pause-stats{
  position:absolute;bottom:44px;left:0;right:0;
  text-align:center;z-index:5;
  opacity:0;animation:fadeUpSoft 0.6s ease-out 1.2s forwards;
}
.pause-stats span{
  font-size:11px;font-weight:500;font-style:italic;
  color:var(--dark-text2);
}

/* ── GROUNDING ── */
.grounding-content{padding:0 36px;}
.grounding-emoji{
  font-size:44px;margin-bottom:20px;
  opacity:0;animation:fadeUpSoft 0.5s ease-out 0.2s forwards;
}
.a-screen .grounding-emoji{font-size:0;width:44px;height:44px;border-radius:50%;background:rgba(var(--plant-color-rgb),0.3);margin-bottom:20px;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeUpSoft 0.5s ease-out 0.2s forwards;}
.grounding-title{
  font-size:18px;font-weight:700;color:var(--dark-text);
  text-align:center;margin-bottom:6px;
  opacity:0;animation:fadeUpSoft 0.6s ease-out 0.3s forwards;
}
.grounding-sub{
  font-size:12.5px;color:var(--dark-text2);
  text-align:center;margin-bottom:32px;
  opacity:0;animation:fadeUpSoft 0.6s ease-out 0.45s forwards;
}
.grounding-steps{
  display:flex;flex-direction:column;gap:14px;
  width:100%;max-width:260px;
}
.grounding-step{
  display:flex;align-items:center;gap:14px;
  opacity:0;
  padding:10px 16px;
  border-radius:16px;
  background:rgba(var(--plant-color-rgb),0.06);
  border:1px solid rgba(var(--plant-color-rgb),0.08);
  transition:all 0.3s;
}
.grounding-step.show{animation:fadeUpSoft 0.5s ease-out forwards;}
.grounding-step .step-num{
  width:32px;height:32px;border-radius:50%;
  background:rgba(var(--plant-color-rgb),0.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:18px;color:rgba(var(--plant-color-rgb),0.9);
  flex-shrink:0;
}
.grounding-step .step-text{
  font-size:13px;font-weight:500;color:var(--dark-text);
  line-height:1.4;
}

/* ── COMPLETION ── */
.done-content{padding:0 36px;}
.done-plant{
  width:100px;height:100px;margin-bottom:20px;
  animation:doneGlow 3s ease-in-out infinite;
  opacity:0;animation:fadeUpSoft 0.6s ease-out 0.2s forwards, doneGlow 3s ease-in-out 0.8s infinite;
}
.done-plant svg{width:100%;height:100%;}
.done-text{
  font-size:17px;font-weight:700;color:var(--dark-text);
  text-align:center;max-width:250px;line-height:1.5;
  margin-bottom:8px;
  opacity:0;animation:fadeUpSoft 0.6s ease-out 0.4s forwards;
}
.done-sub{
  font-size:12.5px;color:var(--dark-text2);
  text-align:center;margin-bottom:28px;
  opacity:0;animation:fadeUpSoft 0.6s ease-out 0.55s forwards;
}
.done-cta{
  padding:14px 44px;border-radius:999px;
  background:rgba(var(--plant-color-rgb),0.2);
  border:1.5px solid rgba(var(--plant-color-rgb),0.3);
  color:var(--dark-text);
  font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;
  transition:all 0.25s;
  opacity:0;animation:fadeUpSoft 0.5s ease-out 0.7s forwards;
}
.done-cta:hover{background:rgba(var(--plant-color-rgb),0.32);border-color:rgba(var(--plant-color-rgb),0.45);}
.ios-screen .done-cta{
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  background:rgba(var(--plant-color-rgb),0.18);
}
.done-grow{
  margin-top:16px;
  font-size:11px;font-weight:600;
  color:rgba(var(--plant-color-rgb),0.6);
  letter-spacing:0.04em;
  opacity:0;animation:fadeUpSoft 0.5s ease-out 0.85s forwards;
}

/* ── KEYFRAMES ── */
@keyframes fadeUpSoft{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:none;}
}
@keyframes fabPulse{
  0%,100%{box-shadow:0 4px 20px rgba(var(--plant-color-rgb),0.4),0 2px 8px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.25);}
  50%{box-shadow:0 6px 32px rgba(var(--plant-color-rgb),0.55),0 2px 8px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.25);}
}
@keyframes fabPulseRing{
  0%{transform:scale(1);opacity:0.6;}
  100%{transform:scale(2.2);opacity:0;}
}
@keyframes starTwinkle{
  0%,100%{opacity:0.15;}
  50%{opacity:0.6;}
}
@keyframes particleFloat{
  0%{opacity:0;transform:translateY(0) scale(0.4);}
  15%{opacity:0.5;}
  85%{opacity:0.2;}
  100%{opacity:0;transform:translateY(-120px) translateX(var(--dx)) scale(0.8);}
}
@keyframes doneGlow{
  0%,100%{filter:drop-shadow(0 0 10px rgba(var(--plant-color-rgb),0.25));}
  50%{filter:drop-shadow(0 0 24px rgba(var(--plant-color-rgb),0.45));}
}
@keyframes fakePlantBreathe{
  0%,100%{transform:scale(1);opacity:1;}
  50%{transform:scale(1.04);opacity:0.85;}
}
@keyframes celebrateParticle{
  0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}
</style>
</head>
<body>
<div class="studio">
  <header class="studio-header">
    <div class="brand-eyebrow">Brota</div>
    <h1 class="brand-title">A7 — Pause<em>Botao de panico / Cocoon de respiracao</em></h1>
    <p class="brand-sub">FAB flutuante em qualquer tela. Tap = cocoon escuro instantaneo. Breathing guiado 4-4-4. Grounding 5-4-3-2-1. Reduz estimulo. Planta respira com voce.</p>
  </header>

  <div class="controls">
    <button class="state-btn active" onclick="setPlant('s1',this)">Lavanda</button>
    <button class="state-btn" onclick="setPlant('s2',this)">Girassol</button>
    <button class="state-btn" onclick="setPlant('s3',this)">Cacto</button>
    <button class="state-btn" onclick="setPlant('s4',this)">Cerejeira</button>
    <button class="state-btn" onclick="setPlant('s5',this)">Lotus</button>
    <div class="state-sep"></div>
    <button class="state-btn phase-btn active" data-phase="folicular" onclick="setPhase('folicular',this)">Folicular</button>
    <button class="state-btn phase-btn" data-phase="menstrual" onclick="setPhase('menstrual',this)">Menstrual</button>
    <button class="state-btn scene-btn active" onclick="setScene('fab',this)">FAB</button>
    <button class="state-btn scene-btn" onclick="setScene('breathing',this)">Respirando</button>
    <button class="state-btn scene-btn" onclick="setScene('grounding',this)">Grounding</button>
    <button class="state-btn scene-btn" onclick="setScene('done',this)">Conclusao</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
var plants = {

/* ═══════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════ */
function setPlant(key,btn){
  currentPlant = plants[key];
  document.querySelectorAll('.state-btn:not(.scene-btn):not(.phase-btn)').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function setPhase(phase,btn){
  currentPhase = phase;
  document.querySelectorAll('.phase-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  if(breathTimer){clearInterval(breathTimer);breathTimer=null;}
  applyState();
  if(currentScene==='breathing') startBreathing();
}

function setScene(scene,btn){
  if(breathTimer){clearInterval(breathTimer);breathTimer=null;}
  currentScene = scene;
  document.querySelectorAll('.scene-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
  if(scene==='breathing') startBreathing();
}

function fabTap(){
  var sceneBtns = document.querySelectorAll('.scene-btn');
  setScene('breathing', sceneBtns[1]);
}

function applyState(){
  var s = currentPlant;
  var r = document.documentElement;
  r.style.setProperty('--plant-color',s.color);
  r.style.setProperty('--plant-color-rgb',s.rgb);

  var isFab = currentScene==='fab';

  ['a','i'].forEach(function(p){
    var fabEl = document.getElementById(p+'-fab');
    var pauseEl = document.getElementById(p+'-pause');
    if(!fabEl||!pauseEl) return;

    fabEl.style.display = isFab ? 'block' : 'none';
    pauseEl.style.display = isFab ? 'none' : 'block';

    /* Plant name + speech */
    var pnameEl = document.getElementById(p+'-pname');
    var pspeechEl = document.getElementById(p+'-pspeech');
    if(pnameEl) pnameEl.textContent = s.plant+':';
    if(pspeechEl) pspeechEl.innerHTML = (currentPhase==='menstrual' ? menstrualSpeeches : pauseSpeeches)[s.plant];

    /* Plant SVG in core */
    var corePlantEl = document.getElementById(p+'-core-plant');
    if(corePlantEl){
      corePlantEl.innerHTML = corePlants[s.plant].replace(/__CLR__/g, s.color);
    }

    /* Section visibility */
    var breathContent = document.getElementById(p+'-breath-content');
    var groundContent = document.getElementById(p+'-grounding');
    var doneContent = document.getElementById(p+'-done');
    var statsEl = document.getElementById(p+'-stats');

    var showBreath = currentScene==='breathing';
    var showGround = currentScene==='grounding';
    var showDone = currentScene==='done';

    breathContent.style.display = showBreath ? 'flex' : 'none';
    groundContent.style.display = showGround ? 'flex' : 'none';
    doneContent.style.display = showDone ? 'flex' : 'none';
    statsEl.style.display = (showBreath||showGround) ? 'block' : 'none';

    /* Reset breath core */
    if(!showBreath){
      var core = document.getElementById(p+'-core');
      if(core) core.className = 'breath-core';
      var orb = document.getElementById(p+'-orb');
      if(orb) orb.className = 'breath-orb-area';
    }

    /* Grounding steps animation */
    if(showGround) showGroundingSteps(p);

    /* Done content */
    if(showDone){
      var donePlant = document.getElementById(p+'-done-plant');
      var doneText = document.getElementById(p+'-done-text');
      if(donePlant) donePlant.innerHTML = corePlants[s.plant].replace(/__CLR__/g, s.color);
      if(doneText) doneText.innerHTML = (currentPhase==='menstrual' ? menstrualDone : doneTexts)[s.plant];
    }

    /* Restart animations by cloning */
    restartAnimations(pauseEl);
  });
}

function restartAnimations(container){
  container.querySelectorAll('.pause-plant-name,.pause-speech,.pause-stats,.grounding-emoji,.grounding-title,.grounding-sub,.done-plant,.done-text,.done-sub,.done-cta,.done-grow').forEach(function(el){
    var clone = el.cloneNode(true);
    el.parentNode.replaceChild(clone, el);
  });
}

/* ═══════════════════════════════════════
   BREATHING ENGINE
   ═══════════════════════════════════════ */
function startBreathing(){
  var cycle = 0; // 0=inhale, 1=hold, 2=exhale
  var beatLen = currentPhase==='menstrual' ? 6 : 4;
  var count = beatLen;

  function setBreathState(phase){
    var labels = currentPhase==='menstrual' ? ['Inspire devagar','Segure com calma','Expire suave'] : ['Inspire','Segure','Expire'];
    var coreClasses = ['inhale','hold','exhale'];
    var orbClasses = ['inhale-rings','inhale-rings','exhale-rings'];

    ['a','i'].forEach(function(p){
      var inst = document.getElementById(p+'-binst');
      var cnt = document.getElementById(p+'-bcnt');
      var core = document.getElementById(p+'-core');
      var orb = document.getElementById(p+'-orb');
      if(inst) inst.textContent = labels[phase];
      if(cnt) cnt.textContent = count;
      if(core) core.className = 'breath-core ' + coreClasses[phase];
      if(orb) orb.className = 'breath-orb-area ' + orbClasses[phase];
    });
  }

  /* Initial state */
  count = beatLen;
  var initLabel = currentPhase==='menstrual' ? 'Inspire devagar' : 'Inspire';
  ['a','i'].forEach(function(p){
    var inst = document.getElementById(p+'-binst');
    var cnt = document.getElementById(p+'-bcnt');
    var core = document.getElementById(p+'-core');
    var orb = document.getElementById(p+'-orb');
    if(inst) inst.textContent = initLabel;
    if(cnt) cnt.textContent = String(beatLen);
    if(core){core.className='breath-core';setTimeout(function(){core.classList.add('inhale');},80);}
    if(orb){orb.className='breath-orb-area';setTimeout(function(){orb.classList.add('inhale-rings');},80);}
  });

  breathTimer = setInterval(function(){
    count--;
    if(count <= 0){
      cycle = (cycle+1) % 3;
      count = beatLen;
    }
    setBreathState(cycle);
  }, 1000);
}

/* ═══════════════════════════════════════
   GROUNDING
   ═══════════════════════════════════════ */
function showGroundingSteps(prefix){
  [5,4,3,2,1].forEach(function(n,i){
    var el = document.getElementById(prefix+'-g'+n);
    if(!el) return;
    el.classList.remove('show');
    el.style.animationDelay = (i*0.5+0.6)+'s';
    void el.offsetWidth;
    el.classList.add('show');
  });
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderStage();
applyState();
</script>
