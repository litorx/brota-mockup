<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — A6: Jardim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --shadow:0 2px 12px rgba(61,44,46,0.06);
  --shadow2:0 6px 24px rgba(61,44,46,0.10);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.tab-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;background:var(--bg);border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;background:var(--bg);}
.statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;}
.stime{font-size:15px;font-weight:700;color:var(--text);}
.sicons{display:flex;gap:5px;color:var(--text2);font-size:11px;}
.dyna{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:rgba(61,44,46,0.10);border-radius:999px;z-index:30;pointer-events:none;}
.a-screen .dyna{display:none;}

/* ── SCROLL BODY ── */
.scroll-body{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 20px 100px;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.scroll-body::-webkit-scrollbar{display:none;}
.scroll-body>*{flex-shrink:0;}
.ios-screen .scroll-body{top:0;padding-top:60px;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUpBounce{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:0.8;}50%{transform:scale(1.15);opacity:1;}}
@keyframes plantWiggle{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-3deg);}75%{transform:rotate(3deg);}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

.anim-el{opacity:0;animation:fadeUpBounce 0.50s cubic-bezier(0.34,1.56,0.64,1) both;}
.ios-screen .anim-el{animation-name:fadeUp;animation-timing-function:cubic-bezier(0.32,0.72,0,1);}

/* ── BLOBS ── */
.blob{position:absolute;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);transition:background 0.7s,opacity 0.7s;}
.blob1{width:280px;height:280px;top:-80px;right:-40px;background:var(--brand-ai);opacity:0.06;}
.blob2{width:220px;height:220px;bottom:160px;left:-50px;background:var(--plant-color);opacity:0.05;}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:6px;z-index:1;position:relative;}
.page-h1{font-size:22px;font-weight:800;color:var(--text);line-height:1.22;}
.page-sub{font-size:13px;font-weight:400;color:var(--text2);line-height:1.45;margin-top:4px;}

/* ── CONNECTOR ── */
.connector{
  font-size:13px;font-weight:500;color:var(--brand-real);
  margin-bottom:14px;z-index:1;position:relative;line-height:1.5;
}

/* ── IN-APP TABS ── */
.app-tabs{
  display:flex;gap:6px;margin-bottom:16px;z-index:1;position:relative;
}
.app-tab{
  flex:1;padding:9px 6px;border-radius:14px;border:none;
  background:var(--card);border:1.5px solid var(--border);
  font-family:inherit;font-size:12px;font-weight:600;
  color:var(--text2);cursor:pointer;text-align:center;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:var(--shadow);
}
.app-tab.active{
  background:rgba(var(--plant-color-rgb),0.10);
  border-color:rgba(var(--plant-color-rgb),0.25);
  color:var(--text);font-weight:700;
}
.ios-screen .app-tab{
  backdrop-filter:blur(10px) saturate(120%);
  background:rgba(255,255,255,0.80);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.ios-screen .app-tab.active{
  background:rgba(var(--plant-color-rgb),0.10);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}

/* ── STATS BANNER ── */
.stats-banner{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 14px;border-radius:14px;
  background:rgba(var(--plant-color-rgb),0.06);
  margin-bottom:16px;z-index:1;position:relative;
  transition:background 0.7s;
}
.stats-banner-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--brand-ai);
  animation:sunPulse 2s ease-in-out infinite;
}
.stats-banner-text{font-size:12px;font-weight:600;color:var(--text2);}
.stats-banner-text strong{color:var(--text);font-weight:700;}

/* ── SEED CARD (post) ── */
.seed-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:16px;margin-bottom:12px;z-index:1;position:relative;
}
.ios-screen .seed-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.seed-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.seed-avatar{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;
}
.seed-avatar-inner{
  width:100%;height:100%;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
/* Plant mascot avatar (fonte unica plant-svgs.js) */
.seed-avatar-inner svg{width:118%;height:118%;display:block;}
.seed-name{font-size:12px;font-weight:700;color:var(--text);}
.seed-time{font-size:10px;font-weight:400;color:var(--text3);}
.seed-body{font-size:13.5px;font-weight:400;color:var(--text);line-height:1.55;margin-bottom:12px;}
.seed-body em{font-style:italic;font-family:'Instrument Serif',serif;font-size:14.5px;}

/* Seed actions */
.seed-actions{display:flex;gap:10px;}
.seed-action{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:999px;border:none;
  background:rgba(var(--plant-color-rgb),0.06);
  font-family:inherit;font-size:11.5px;font-weight:600;
  color:var(--text2);cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.seed-action:hover{
  background:rgba(var(--plant-color-rgb),0.14);
  color:var(--text);
}
.seed-action.sunned{
  background:rgba(255,208,122,0.18);
  color:var(--brand-warning);
}
.seed-action-icon{font-size:14px;line-height:1;}
.ios-screen .seed-action{
  backdrop-filter:blur(6px) saturate(120%);
  background:rgba(255,255,255,0.65);
}
.ios-screen .seed-action:hover{background:rgba(var(--plant-color-rgb),0.10);}
.seed-action .reply-count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;border-radius:8px;
  background:rgba(var(--plant-color-rgb),0.18);
  font-size:9px;font-weight:700;color:var(--text2);
  padding:0 4px;margin-left:2px;
  transition:background 0.3s;
}
.seed-action.watering{
  background:rgba(168,213,162,0.18);
  color:var(--brand-ai-deep);
}
.seed-action.watering .reply-count{
  background:rgba(168,213,162,0.25);
  color:var(--brand-ai-deep);
}

/* ── REPLY THREAD ── */
.reply-thread{
  display:none;margin-top:12px;padding-top:12px;
  border-top:1px solid var(--border);
}
.reply-thread.open{display:block;}
.reply-item{
  display:flex;gap:10px;margin-bottom:10px;
  padding-left:6px;
}
.reply-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.reply-avatar{overflow:hidden;}
.reply-avatar svg{width:120%;height:120%;display:block;}
.reply-content{flex:1;min-width:0;}
.reply-name{font-size:11px;font-weight:700;color:var(--text);display:inline;}
.reply-time{font-size:10px;font-weight:400;color:var(--text3);margin-left:6px;}
.reply-text{font-size:12.5px;font-weight:400;color:var(--text);line-height:1.45;margin-top:2px;}
.reply-text em{font-style:italic;font-family:'Instrument Serif',serif;font-size:13px;}
.reply-action-row{display:flex;gap:8px;margin-top:4px;}
.reply-action-btn{
  border:none;background:none;padding:0;
  font-family:inherit;font-size:10px;font-weight:600;
  color:var(--text3);cursor:pointer;
  transition:color 0.2s;
}
.reply-action-btn:hover{color:var(--text2);}

/* Reply input */
.reply-input-wrap{
  display:flex;gap:8px;align-items:center;
  margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);
}
.reply-input{
  flex:1;padding:9px 14px;border-radius:999px;
  border:1.5px solid var(--border);
  background:var(--bg);
  font-family:inherit;font-size:12px;color:var(--text);
  outline:none;transition:border-color 0.25s;
}
.reply-input:focus{border-color:rgba(var(--plant-color-rgb),0.35);}
.reply-input::placeholder{color:var(--text3);}
.ios-screen .reply-input{
  backdrop-filter:blur(6px) saturate(120%);
  background:rgba(255,255,255,0.65);
}
.reply-send{
  width:32px;height:32px;border-radius:50%;border:none;
  background:var(--brand-ai);color:white;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:transform 0.2s,background 0.2s;
}
.reply-send:hover{transform:scale(1.08);}
.reply-send:active{transform:scale(0.92);}
.ios-screen .reply-send{
  backdrop-filter:blur(10px) saturate(180%);
  background:rgba(168,213,162,0.88);
  box-shadow:0 1px 0 rgba(255,255,255,0.30) inset;
}

/* ── MOON CIRCLE CARD ── */
.moon-card{
  background:linear-gradient(135deg, rgba(196,176,224,0.08), rgba(242,213,213,0.08));
  border:1.5px solid rgba(196,176,224,0.15);
  border-radius:var(--r);padding:16px;margin-bottom:12px;
  z-index:1;position:relative;
}
.ios-screen .moon-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.85));
  border:1.5px solid rgba(196,176,224,0.18);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.moon-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.moon-icon{font-size:20px;line-height:1;}
.moon-title{font-size:13px;font-weight:700;color:var(--text);}
.moon-badge{
  padding:3px 8px;border-radius:999px;
  background:rgba(196,176,224,0.15);
  font-size:9px;font-weight:700;color:#9B8AC4;
  text-transform:uppercase;letter-spacing:0.06em;
}
.moon-body{font-size:12.5px;font-weight:400;color:var(--text2);line-height:1.5;}
.moon-body em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text);}
.moon-members{
  display:flex;align-items:center;gap:4px;margin-top:10px;
}
.moon-member{
  width:26px;height:26px;border-radius:50%;
  border:2px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:0;margin-left:-8px;
}
.moon-member:first-child{margin-left:0;}
.a-screen .moon-member::after{
  content:'';width:10px;height:10px;border-radius:50%;
  background:white;opacity:0.5;
}
.ios-screen .moon-member{font-size:13px;}
.moon-count{font-size:11px;font-weight:600;color:var(--text2);margin-left:4px;}

/* ── PLANT FAB (Plantar semente) ── */
.plant-fab{
  position:absolute;bottom:78px;right:16px;z-index:15;
  width:52px;height:52px;border-radius:16px;
  background:var(--brand-ai);
  box-shadow:0 6px 20px rgba(168,213,162,0.35);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.2s;
}
.ios-screen .plant-fab{bottom:90px;border-radius:50%;
  backdrop-filter:blur(12px) saturate(180%);
  background:rgba(168,213,162,0.88);
  box-shadow:0 6px 20px rgba(168,213,162,0.30),0 1px 0 rgba(255,255,255,0.30) inset;
}
.plant-fab:active{transform:scale(0.9);}
.plant-fab svg{width:24px;height:24px;color:white;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  pointer-events:none;
}
.a-screen .bottom-nav{
  height:68px;background:var(--card);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(61,44,46,0.05);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px;pointer-events:auto;
}
.a-screen .nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:16px;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.a-screen .nav-item.active{background:rgba(var(--plant-color-rgb),0.10);}
.a-screen .nav-item .nav-icon{font-size:20px;line-height:1;}
.a-screen .nav-item .nav-label{font-size:10px;font-weight:600;color:var(--text2);}
.a-screen .nav-item.active .nav-label{color:var(--plant-color);font-weight:700;}
.ios-screen .bottom-nav{
  bottom:20px;left:20px;right:20px;height:56px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(24px) saturate(180%);
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.45);
  box-shadow:0 8px 32px rgba(61,44,46,0.10),0 1px 0 rgba(255,255,255,0.60) inset;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 12px;pointer-events:auto;
}
.ios-screen .nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 10px;cursor:pointer;transition:all 0.25s;
}
.ios-screen .nav-item .nav-icon{font-size:19px;line-height:1;}
.ios-screen .nav-item .nav-label{font-size:9.5px;font-weight:600;color:var(--text2);}
.ios-screen .nav-item.active .nav-label{color:var(--plant-color);font-weight:700;}
.nav-item.active .nav-icon{position:relative;}
.nav-item.active .nav-icon::after{
  content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--plant-color);
  transition:background 0.7s;
}

@media(max-width:820px){.stage{flex-direction:column;align-items:center;}}
</style>
</head>
<body>
<div class="studio">
  <div class="studio-header">
    <div class="brand-eyebrow">Brota</div>
    <div class="brand-title">A6 — O Jardim<em>Comunidade anonima &middot; onde todas crescem juntas</em></div>
    <div class="brand-sub">Feed de sementes (posts). Dar luz solar (like sem contagem). Regar (responder). Plantar semente (postar). Circulo da Lua (cycle-aware).</div>
  </div>

  <div class="controls">
    <button class="state-btn active" onclick="setPlant('s1',this)">Lavanda</button>
    <button class="state-btn" onclick="setPlant('s2',this)">Girassol</button>
    <button class="state-btn" onclick="setPlant('s3',this)">Cacto</button>
    <button class="state-btn" onclick="setPlant('s4',this)">Cerejeira</button>
    <button class="state-btn" onclick="setPlant('s5',this)">Lotus</button>
    <div class="state-sep"></div>
    <button class="state-btn tab-btn active" onclick="setTab('geral',this)">Geral</button>
    <button class="state-btn tab-btn" onclick="setTab('canteiro',this)">Meu Canteiro</button>
    <button class="state-btn tab-btn" onclick="setTab('lua',this)">Circulo da Lua</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

<script src="../shared/plant-svgs.js"></script>
<script src="../shared/icons.js"></script>
<script>
/* Avatar do arquetipo: mascote da fonte unica (plant-svgs.js) na cor da planta */
function plantAvatar(name, color){
  var arche = (name||'').replace(/^uma?\s+/i,'').trim();
  return (typeof renderPlantSVG === 'function') ? renderPlantSVG(arche, color) : '';
}
/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
var plants = {
  s1:{name:'Ana',  plant:'Lavanda',   color:'#C4B0E0',rgb:'196,176,224'},
  s2:{name:'Bia',  plant:'Girassol',  color:'#F2CE6B',rgb:'242,206,107'},
  s3:{name:'Carol',plant:'Cacto',     color:'#8CC5A0',rgb:'140,197,160'},
  s4:{name:'Dani', plant:'Cerejeira', color:'#F2B5C4',rgb:'242,181,196'},
  s5:{name:'Eva',  plant:'Lotus',     color:'#D4B8D4',rgb:'212,184,212'}
};

var connectors = {
  Lavanda:'Lavanda: Aqui todo mundo ta crescendo. Juntas.',
  Girassol:'Girassol: Olha quanta gente bonita aqui!',
  Cacto:'Cacto: Legal. Gente de verdade. Sem filtro.',
  Cerejeira:'Cerejeira: Cada semente aqui e uma coragem.',
  Lotus:'Lotus: Esse espaco e silencio compartilhado.'
};

var seedColors = ['#C4B0E0','#F2CE6B','#8CC5A0','#F2B5C4','#D4B8D4','#A8D5A2','#FFD07A'];
var seedEmojis = ['<i data-mi="grow"></i>','<i data-mi="leaf"></i>','<i data-mi="jardim"></i>','<i data-mi="jardim"></i>','<i data-mi="sun"></i>','<i data-mi="jardim"></i>','<i data-mi="leaf"></i>'];

var seeds = {
  geral:[
    {name:'Uma Lavanda',color:'#C4B0E0',emoji:'<i data-mi="grow"></i>',time:'2h',
     text:'Hoje deletei 14 contas do Instagram. Fiquei com medo de perder conteudo. Mas sabe o que eu percebi? <em>Eu nao perdi nada.</em>',

var currentPlant = plants.s1;
var currentTab = 'geral';

/* ═══════════════════════════════════════

   ═══════════════════════════════════════ */

    html += '</div><div class="phone"><div class="phone-screen"><div class="screen '+cls+'" id="'+p+'-screen">';

    html += '<div class="blob blob1"></div><div class="blob blob2"></div>';

    html += '<div class="statusbar"><span class="stime">9:41</span><span class="sicons"><svg width="15" height="11" fill="currentColor"><rect x="0" y="4" width="3" height="7" rx="0.5" opacity="0.4"/><rect x="4" y="2.5" width="3" height="8.5" rx="0.5" opacity="0.5"/><rect x="8" y="1" width="3" height="10" rx="0.5" opacity="0.7"/><rect x="12" y="0" width="3" height="11" rx="0.5"/></svg></span></div>';

    /* Scroll body */
    html += '<div class="scroll-body" id="'+p+'-body">';

    /* Page header */

    html += '<div class="page-h1">O Jardim</div>';
    html += '<div class="page-sub">Onde todas crescem juntas.</div>';
    html += '</div>';

    /* Connector */
    html += '<div class="connector anim-el" style="animation-delay:0.25s" id="'+p+'-conn"></div>';

    /* In-app tabs */
    html += '<div class="app-tabs anim-el" style="animation-delay:0.32s">';
    html += '<button class="app-tab active" id="'+p+'-tab-geral" onclick="setTab(\'geral\')">Geral</button>';
    html += '<button class="app-tab" id="'+p+'-tab-canteiro" onclick="setTab(\'canteiro\')">Meu Canteiro</button>';

/* ═══════════════════════════════════════
   SEED RENDERING
   ═══════════════════════════════════════ */
function renderSeeds(prefix){
  var feed = document.getElementById(prefix+'-feed');
  if(!feed) return;
  feed.innerHTML = '';

  var isIos = prefix === 'i';
  var tabSeeds = seeds[currentTab] || [];

  tabSeeds.forEach(function(seed, idx){
    var delay = 0.50 + idx * 0.10;
    var seedId = prefix+'-seed-'+currentTab+'-'+idx;
    var html = '<div class="seed-card anim-el" style="animation-delay:'+delay+'s">';

    /* Header */
    html += '<div class="seed-header">';
    html += '<div class="seed-avatar"><div class="seed-avatar-inner" style="background:'+seed.color+'">'+plantAvatar(seed.name,seed.color)+'</div></div>';
    html += '<div><div class="seed-name">'+seed.name+'</div><div class="seed-time">'+seed.time+' atras</div></div>';
    html += '</div>';

    /* Body */
    html += '<div class="seed-body">'+seed.text+'</div>';

    /* Actions */
    var replyCount = seed.replies ? seed.replies.length : 0;
    html += '<div class="seed-actions">';
    html += '<button class="seed-action'+(seed.sunned?' sunned':'')+'" onclick="toggleSun(this)">';
    html += '<span class="seed-action-icon"><i data-mi="sun"></i>&#65039;</span> Dar luz solar';
    html += '</button>';
    html += '<button class="seed-action" onclick="toggleReplies(\''+seedId+'\')">';
    html += '<span class="seed-action-icon"><i data-mi="drop"></i></span> Regar';
    if(replyCount > 0) html += ' <span class="reply-count">'+replyCount+'</span>';
    html += '</button>';
    html += '</div>';

    /* Reply thread */
    html += '<div class="reply-thread" id="'+seedId+'">';
    if(seed.replies){
      seed.replies.forEach(function(reply){
        html += '<div class="reply-item">';
        html += '<div class="reply-avatar" style="background:'+reply.color+'">'+plantAvatar(reply.name,reply.color)+'</div>';
        html += '<div class="reply-content">';
        html += '<div><span class="reply-name">'+reply.name+'</span><span class="reply-time">'+reply.time+'</span></div>';
        html += '<div class="reply-text">'+reply.text+'</div>';
        html += '<div class="reply-action-row">';
        html += '<button class="reply-action-btn" onclick="toggleSunReply(this)"><i data-mi="sun"></i>&#65039; Dar luz</button>';
        html += '<button class="reply-action-btn">Responder</button>';
        html += '</div>';
        html += '</div>';
        html += '</div>';
      });
    }
    /* Reply input */
    html += '<div class="reply-input-wrap">';
    html += '<input class="reply-input" placeholder="Regar com uma resposta..." />';
    html += '<button class="reply-send" onclick="sendReply(this)"><svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';
    html += '</div>';
    html += '</div>';

    html += '</div>';
    feed.innerHTML += html;
  });
}

function toggleSun(btn){
  btn.classList.toggle('sunned');
}

function toggleSunReply(btn){
  if(btn.dataset.sunned){
    btn.textContent = '\u2600\uFE0F Dar luz';
    delete btn.dataset.sunned;
    btn.style.color = '';
  } else {
    btn.textContent = '\u2600\uFE0F Luz dada!';
    btn.dataset.sunned = '1';
    btn.style.color = 'var(--brand-warning)';
  }
}

function toggleReplies(seedId){
  var thread = document.getElementById(seedId);
  if(!thread) return;
  thread.classList.toggle('open');
  /* Focus input when opening */
  if(thread.classList.contains('open')){
    var input = thread.querySelector('.reply-input');
    if(input) setTimeout(function(){input.focus();},200);
  }
}

function sendReply(btn){
  var wrap = btn.parentElement;
  var input = wrap.querySelector('.reply-input');
  if(!input || !input.value.trim()) return;

  var thread = wrap.parentElement;
  var text = input.value.trim();
  var s = currentPlant;

  /* Create reply element */
  var replyDiv = document.createElement('div');
  replyDiv.className = 'reply-item';
  replyDiv.style.opacity = '0';
  replyDiv.style.transform = 'translateY(8px)';
  replyDiv.innerHTML = ''
    +'<div class="reply-avatar" style="background:'+s.color+'">'+plantAvatar(s.plant,s.color)+'</div>'
    +'<div class="reply-content">'
    +'<div><span class="reply-name">Voce ('+s.plant+')</span><span class="reply-time">agora</span></div>'
    +'<div class="reply-text">'+text+'</div>'
    +'<div class="reply-action-row">'
    +'<button class="reply-action-btn" onclick="toggleSunReply(this)"><i data-mi="sun"></i>&#65039; Dar luz</button>'
    +'</div>'
    +'</div>';

  thread.insertBefore(replyDiv, wrap);
  input.value = '';

  /* Animate in */
  requestAnimationFrame(function(){
    replyDiv.style.transition = 'opacity 0.35s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
    replyDiv.style.opacity = '1';
    replyDiv.style.transform = 'none';
  });
}

/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
function setPlant(key,btn){
  currentPlant = plants[key];
  document.querySelectorAll('.state-btn:not(.tab-btn)').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function setTab(tab,btn){
  currentTab = tab;
  if(btn){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
  }
  applyState();
}

function applyState(){
  var s = currentPlant;
  var r = document.documentElement;

  r.style.setProperty('--plant-color',s.color);
  r.style.setProperty('--plant-color-rgb',s.rgb);

  ['a','i'].forEach(function(p){
    /* Connector */
    var conn = document.getElementById(p+'-conn');
    if(conn) conn.textContent = connectors[s.plant];

    /* In-app tabs */
    ['geral','canteiro','lua'].forEach(function(t){
      var tab = document.getElementById(p+'-tab-'+t);
      if(tab){
        tab.classList.toggle('active', t === currentTab);
      }
    });

    /* Stats text */
    var statsText = document.getElementById(p+'-statstext');
    if(statsText){
      var statsMap = {
        geral:'<strong>847</strong> plantas crescendo juntas agora',
        canteiro:'<strong>24</strong> plantas no seu canteiro',
        lua:'<strong>23</strong> mulheres na mesma fase que voce'
      };
      statsText.innerHTML = statsMap[currentTab];
    }

    /* Moon card visibility */
    var moonCard = document.getElementById(p+'-mooncard');
    if(moonCard) moonCard.style.display = currentTab === 'lua' ? 'block' : 'none';

    /* Feed */
    renderSeeds(p);
  });
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderStage();
applyState();
