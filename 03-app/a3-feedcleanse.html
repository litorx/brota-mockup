<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — A3: Feed Cleanse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --shadow:0 2px 12px rgba(61,44,46,0.06);
  --shadow2:0 6px 24px rgba(61,44,46,0.10);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.scene-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;background:var(--bg);border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}
.statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;}
.stime{font-size:15px;font-weight:700;color:var(--text);}
.sicons{display:flex;gap:5px;color:var(--text2);font-size:11px;}
.dyna{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:rgba(61,44,46,0.10);border-radius:999px;z-index:30;pointer-events:none;}
.a-screen .dyna{display:none;}

/* ── SCROLL BODY ── */
.scroll-body{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 20px 100px;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.scroll-body::-webkit-scrollbar{display:none;}
.scroll-body>*{flex-shrink:0;}
.ios-screen .scroll-body{top:0;padding-top:60px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUpBounce{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
@keyframes shimmer{0%{transform:translateX(-200%) skewX(-14deg);}40%,100%{transform:translateX(200%) skewX(-14deg);}}
@keyframes pulseGlow{0%,100%{box-shadow:var(--shadow);}50%{box-shadow:0 4px 20px rgba(var(--plant-color-rgb),0.18);}}
@keyframes checkPop{0%{transform:scale(0);}50%{transform:scale(1.3);}100%{transform:scale(1);}}
@keyframes celebrateBounce{0%{transform:scale(0.5) translateY(20px);opacity:0;}60%{transform:scale(1.1) translateY(-4px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}
@keyframes confettiDrift{0%{transform:translate(0,0) rotate(0);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0;}}
@keyframes plantGrowCelebrate{0%{transform:scale(0.6);opacity:0;}50%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
@keyframes sparkle{0%,100%{opacity:0.3;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

.anim-el{opacity:0;animation:fadeUpBounce 0.50s cubic-bezier(0.34,1.56,0.64,1) both;}
.ios-screen .anim-el{animation-name:fadeUp;animation-timing-function:cubic-bezier(0.32,0.72,0,1);}

/* ── BACK BUTTON ── */
.back-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;padding:2px 0;
}
.back-btn{
  width:32px;height:32px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);transition:all 0.2s;
}
.back-btn:hover{background:var(--bg2);border-color:rgba(61,44,46,0.14);}
.back-btn svg{width:16px;height:16px;}
.back-label{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.02em;}

/* ── HEADER SECTION ── */
.fc-header{margin-bottom:20px;}
.fc-conector{
  font-size:13px;font-weight:600;
  color:var(--brand-real);
  margin-bottom:8px;line-height:1.5;
}
.fc-title{
  font-size:22px;font-weight:800;color:var(--text);
  line-height:1.3;margin-bottom:4px;
}
.fc-title em{
  font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;
  color:var(--brand-real);
}
.fc-subtitle{
  font-size:12.5px;color:var(--text2);line-height:1.55;
}

/* ── PROGRESS DOTS ── */
.progress-row{
  display:flex;align-items:center;gap:0;
  margin-bottom:24px;padding:0 4px;
}
.prog-dot{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;
  position:relative;flex-shrink:0;
  transition:all 0.3s;
}
.prog-dot.done{
  background:var(--brand-correct);color:white;
}
.prog-dot.done svg{width:16px;height:16px;}
.prog-dot.active{
  background:var(--brand-real);color:white;
  box-shadow:0 2px 12px rgba(244,167,185,0.35);
  animation:pulseGlow 2.5s ease-in-out infinite;
}
.prog-dot.locked{
  background:var(--bg2);color:var(--text3);
}
.prog-line{
  flex:1;height:2.5px;border-radius:2px;
  background:var(--border);
  position:relative;overflow:hidden;
}
.prog-line.filled{background:var(--brand-correct);}
.prog-line.filling{background:linear-gradient(90deg, var(--brand-correct), var(--brand-real));}

/* ── TASK CARD ── */
.task-card{
  background:var(--card);border-radius:var(--r);
  padding:20px;margin-bottom:16px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.task-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--brand-real), rgba(var(--plant-color-rgb),0.6));
}
.task-day{
  font-size:11px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--brand-real);margin-bottom:6px;
}
.task-title{
  font-size:16px;font-weight:700;color:var(--text);
  line-height:1.4;margin-bottom:8px;
}
.task-desc{
  font-size:13px;color:var(--text2);line-height:1.6;
  margin-bottom:16px;
}
.task-time{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:600;color:var(--text3);
  margin-bottom:16px;
}
.task-time svg{width:14px;height:14px;color:var(--text3);}

/* ── CTA ── */
.cta-btn{
  width:100%;padding:15px;border-radius:999px;
  border:none;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:700;
  transition:all 0.25s;
  position:relative;overflow:hidden;
}
.a-screen .cta-btn{
  background:var(--brand-real);color:white;
  box-shadow:0 4px 16px rgba(244,167,185,0.3);
}
.a-screen .cta-btn:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(244,167,185,0.2);}
.ios-screen .cta-btn{
  background:rgba(232,136,158,0.88);color:white;
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  backdrop-filter:blur(24px) saturate(180%);
}
/* shimmer */
.cta-btn::after{
  content:'';position:absolute;top:0;left:0;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  animation:shimmer 3s ease-in-out infinite;
}

/* ── PLANT SPEECH BUBBLE ── */
.plant-bubble{
  display:flex;gap:12px;align-items:flex-start;
  background:rgba(var(--plant-color-rgb),0.08);
  border:1px solid rgba(var(--plant-color-rgb),0.12);
  border-radius:16px;padding:14px 16px;
  margin-bottom:16px;
}
.plant-bubble .pb-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(var(--plant-color-rgb),0.2);
  display:flex;align-items:center;justify-content:center;
}
.plant-bubble .pb-avatar svg{width:22px;height:22px;}
.plant-bubble .pb-text{
  font-size:13px;color:var(--text);line-height:1.55;
  font-weight:500;
}
.plant-bubble .pb-text em{
  font-family:'Instrument Serif',serif;font-style:italic;
  color:rgba(var(--plant-color-rgb),0.85);font-weight:400;
}

/* ── STEPS LIST ── */
.steps-list{margin-bottom:16px;}
.step-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}
.step-item:last-child{border-bottom:none;}
.step-num{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  background:rgba(var(--plant-color-rgb),0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:rgba(var(--plant-color-rgb),0.8);
}
.step-text{font-size:13px;color:var(--text);line-height:1.5;font-weight:500;padding-top:2px;}

/* ── COMPLETED DAY CARD ── */
.done-card{
  background:var(--card);border-radius:var(--r);
  padding:20px;margin-bottom:16px;
  border:1px solid rgba(125,212,163,0.2);
  box-shadow:var(--shadow);
  text-align:center;
}
.done-card .done-check{
  width:48px;height:48px;border-radius:50%;
  background:var(--brand-correct);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;
  animation:checkPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.done-card .done-check svg{width:24px;height:24px;color:white;}
.done-card .done-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
.done-card .done-sub{font-size:12.5px;color:var(--text2);line-height:1.5;}
.done-card .done-grow{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:10px;padding:5px 14px;border-radius:999px;
  background:rgba(168,213,162,0.15);
  font-size:11.5px;font-weight:700;color:var(--brand-ai-deep);
}

/* ── LUTEAL PAUSE CARD ── */
.luteal-card{
  background:linear-gradient(135deg, rgba(196,176,224,0.08), rgba(242,213,213,0.1));
  border:1px solid rgba(196,176,224,0.15);
  border-radius:var(--r);padding:20px;margin-bottom:16px;
  text-align:center;
}
.luteal-card .luteal-emoji{font-size:32px;margin-bottom:10px;}
.a-screen .luteal-card .luteal-emoji{font-size:0;width:32px;height:32px;border-radius:50%;background:rgba(196,176,224,0.3);margin:0 auto 10px;}
.luteal-card .luteal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.luteal-card .luteal-text{font-size:12.5px;color:var(--text2);line-height:1.55;}
.luteal-card .luteal-text em{
  font-family:'Instrument Serif',serif;font-style:italic;
  color:rgba(196,176,224,0.85);font-weight:400;
}

/* ── CELEBRATION (Day 7) ── */
.celebrate-area{
  text-align:center;padding:12px 0 0;
  position:relative;
}
.celebrate-plant{
  width:120px;height:120px;margin:0 auto 16px;
  animation:plantGrowCelebrate 1s cubic-bezier(0.34,1.56,0.64,1) both;
  position:relative;
}
.celebrate-plant svg{width:100%;height:100%;}
.celebrate-title{
  font-size:20px;font-weight:800;color:var(--text);
  margin-bottom:6px;
}
.celebrate-title em{
  font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;
  color:var(--brand-real);
}
.celebrate-sub{
  font-size:13px;color:var(--text2);line-height:1.55;
  margin-bottom:16px;max-width:260px;margin-left:auto;margin-right:auto;
}
.celebrate-stats{
  display:flex;gap:12px;justify-content:center;margin-bottom:20px;
}
.celebrate-stat{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:12px 16px;min-width:90px;
  box-shadow:var(--shadow);
}
.celebrate-stat .cs-num{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:24px;color:var(--brand-real);
}
.celebrate-stat .cs-label{font-size:10.5px;color:var(--text3);font-weight:600;margin-top:2px;}
.share-btn{
  width:100%;padding:14px;border-radius:999px;
  border:1.5px solid rgba(var(--plant-color-rgb),0.3);
  background:rgba(var(--plant-color-rgb),0.08);
  color:var(--text);
  font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  margin-top:8px;
}
.share-btn:hover{background:rgba(var(--plant-color-rgb),0.15);}

/* ── CONFETTI ── */
.confetti-container{position:absolute;top:0;left:50%;pointer-events:none;z-index:20;}
.confetti-piece{
  position:absolute;width:6px;height:10px;border-radius:2px;
  animation:confettiDrift 2s ease-out forwards;
}

/* ── FAB PAUSE ── */
.fab-pause{
  position:absolute;bottom:80px;right:16px;z-index:15;
  width:48px;height:48px;border-radius:50%;
  background:var(--brand-real);color:white;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  box-shadow:0 4px 20px rgba(244,167,185,0.30);
  transition:transform 0.2s,box-shadow 0.2s;
}
.fab-pause:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(244,167,185,0.40);}
.fab-pause:active{transform:scale(0.94);}
.ios-screen .fab-pause{
  bottom:92px;right:18px;
  backdrop-filter:blur(20px) saturate(180%);
  background:rgba(232,136,158,0.88);
  border:1px solid rgba(255,255,255,0.30);
  box-shadow:0 1px 0 rgba(255,255,255,0.30) inset,0 4px 20px rgba(244,167,185,0.28);
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;height:72px;
  background:var(--card);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px;z-index:20;
}
.ios-screen .bottom-nav{
  height:76px;bottom:8px;left:12px;right:12px;
  border-radius:999px;border:none;
  background:rgba(255,255,255,0.72);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  backdrop-filter:blur(40px) saturate(200%);
  box-shadow:0 4px 24px rgba(61,44,46,0.1),inset 0 0.5px 0 rgba(255,255,255,0.6);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 12px;cursor:pointer;position:relative;
  transition:all 0.2s;
}
.nav-item svg{width:22px;height:22px;color:var(--text3);transition:color 0.2s;}
.nav-item span{font-size:10px;font-weight:600;color:var(--text3);transition:color 0.2s;}
.nav-item.active svg{color:var(--brand-real);}
.nav-item.active span{color:var(--brand-real);}
/* Android active pill */
.a-screen .nav-item.active{
  background:rgba(244,167,185,0.12);border-radius:20px;padding:4px 16px;
}
/* iOS active dot */
.ios-screen .nav-item.active::after{
  content:'';position:absolute;bottom:-2px;
  width:4px;height:4px;border-radius:50%;
  background:var(--brand-real);
}
</style>
</head>
<body>
<div class="studio">
  <header class="studio-header">
    <div class="brand-eyebrow">Brota</div>
    <h1 class="brand-title">A3 — Feed Cleanse<em>Protocolo de 7 dias para limpar seu feed</em></h1>
    <p class="brand-sub">Journey de 7 dias. Cada dia 1 tarefa concreta. Planta guia e celebra. Adaptacao por ciclo (luteal = pausa). Pilar Reconstrucao (accent blush).</p>
  </header>

  <div class="controls">
    <button class="state-btn active" onclick="setPlant('s1',this)">Lavanda</button>
    <button class="state-btn" onclick="setPlant('s2',this)">Girassol</button>
    <button class="state-btn" onclick="setPlant('s3',this)">Cacto</button>
    <button class="state-btn" onclick="setPlant('s4',this)">Cerejeira</button>
    <button class="state-btn" onclick="setPlant('s5',this)">Lotus</button>
    <div class="state-sep"></div>
    <button class="state-btn scene-btn active" onclick="setScene('active',this)">Dia ativo</button>
    <button class="state-btn scene-btn" onclick="setScene('done-day',this)">Dia feito</button>
    <button class="state-btn scene-btn" onclick="setScene('luteal',this)">Luteal</button>
    <button class="state-btn scene-btn" onclick="setScene('celebrate',this)">Dia 7</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
var plants = {
  s1:{key:'s1',name:'Ana',plant:'Lavanda',color:'#C4B0E0',rgb:'196,176,224'},
  s2:{key:'s2',name:'Bia',plant:'Girassol',color:'#F2CE6B',rgb:'242,206,107'},
  s3:{key:'s3',name:'Carol',plant:'Cacto',color:'#8CC5A0',rgb:'140,197,160'},
  s4:{key:'s4',name:'Dani',plant:'Cerejeira',color:'#F2B5C4',rgb:'242,181,196'},
  s5:{key:'s5',name:'Eva',plant:'Lotus',color:'#D4B8D4',rgb:'212,184,212'}
};

var days = [
  {day:1, title:'Audit: quem te faz mal?', desc:'Abre seu Instagram e lista 10 contas que te fazem se comparar. Sem julgamento — so observa.', time:'10 min',
   steps:['Abre o Instagram ou TikTok','Percorre seu feed por 5 minutos','Anota mentalmente as contas que te causam desconforto','Lista 10 contas aqui']},
  {day:2, title:'Silenciar as 3 piores', desc:'Das 10 que voce encontrou ontem, escolhe as 3 que mais pesam. Silencia ou deixa de seguir.', time:'5 min',
   steps:['Volta na sua lista de ontem','Escolhe as 3 mais toxicas','Silencia ou unfollow cada uma','Respira. Voce nao deve nada a ninguem.']},
  {day:3, title:'Seguir quem te faz bem', desc:'Agora o contrario: segue 3 contas que te fazem sentir real. Body-positive, natureza, arte.', time:'5 min',
   steps:['Busca contas body-positive ou de natureza','Segue 3 que te fazem sorrir','Passa 2 minutos no conteudo delas','Percebe como o corpo reage diferente']},
  {day:4, title:'Desliga os likes', desc:'Desativa notificacoes de likes e comentarios. O numero nao define voce.', time:'3 min',

function buildProgressDots(currentDay, delay, paused){
  var html = '<div class="progress-row anim-el" style="animation-delay:'+(delay*0.001)+'s">';
  for(var i=1;i<=7;i++){
    var cls = 'prog-dot';
    if(i < currentDay) cls += ' done';
    else if(i === currentDay && !paused) cls += ' active';
    else cls += ' locked';

    if(i < currentDay){
      html += '<div class="'+cls+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>';
    } else {
      html += '<div class="'+cls+'">'+i+'</div>';
    }

    if(i < 7){
      var lineClass = 'prog-line';
      if(i < currentDay - 1) lineClass += ' filled';
      else if(i === currentDay - 1) lineClass += ' filling';
      html += '<div class="'+lineClass+'"></div>';
    }
  }
  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════
   CONFETTI
   ═══════════════════════════════════════ */
function spawnConfetti(containerId){
  var el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = '';
  var colors = ['#F4A7B9','#A8D5A2','#7DD4A3','#FFD07A','#C4B0E0','#F2CE6B','#F2B5C4'];
  for(var i=0;i<30;i++){
    var piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.setProperty('--tx', (Math.random()*200-100)+'px');
    piece.style.setProperty('--ty', (Math.random()*200-100)+'px');
    piece.style.setProperty('--rot', (Math.random()*720-360)+'deg');
    piece.style.left = (Math.random()*40-20)+'px';
    piece.style.animationDelay = (Math.random()*0.5)+'s';
    el.appendChild(piece);
  }
}

/* ═══════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════ */
function setPlant(key,btn){
  currentPlant = plants[key];
  document.querySelectorAll('.state-btn:not(.scene-btn)').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function setScene(scene,btn){
  currentScene = scene;
  document.querySelectorAll('.scene-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function applyState(){
  var r = document.documentElement;
  r.style.setProperty('--plant-color', currentPlant.color);
  r.style.setProperty('--plant-color-rgb', currentPlant.rgb);

  ['a','i'].forEach(function(p){
    var body = document.getElementById(p+'-body');
    if(!body) return;
    body.innerHTML = buildContent(p);
    body.scrollTop = 0;

    if(currentScene === 'celebrate'){
      setTimeout(function(){ spawnConfetti(p+'-confetti'); }, 600);
    }
  });
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderStage();
applyState();
