<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — A8: Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --shadow:0 2px 12px rgba(61,44,46,0.06);
  --shadow2:0 6px 24px rgba(61,44,46,0.10);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --cycle-accent:#F4A7B9;--cycle-accent-rgb:244,167,185;
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.phase-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;background:var(--bg);border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;background:var(--bg);}
.statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;}
.stime{font-size:15px;font-weight:700;color:var(--text);}
.sicons{display:flex;gap:5px;color:var(--text2);font-size:11px;}
.dyna{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:rgba(61,44,46,0.10);border-radius:999px;z-index:30;pointer-events:none;}
.a-screen .dyna{display:none;}

/* ── SCROLL BODY ── */
.scroll-body{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 20px 100px;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.scroll-body::-webkit-scrollbar{display:none;}
.scroll-body>*{flex-shrink:0;}
.ios-screen .scroll-body{top:0;padding-top:60px;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUpBounce{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
@keyframes shimmer{0%{transform:translateX(-200%) skewX(-14deg);}40%,100%{transform:translateX(200%) skewX(-14deg);}}
@keyframes breatheSoft{0%,100%{transform:scale(1);}50%{transform:scale(1.02);}}
@keyframes drawLine{from{stroke-dashoffset:600;}to{stroke-dashoffset:0;}}
@keyframes popIn{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

.anim-el{opacity:0;animation:fadeUpBounce 0.50s cubic-bezier(0.34,1.56,0.64,1) both;}
.ios-screen .anim-el{animation-name:fadeUp;animation-timing-function:cubic-bezier(0.32,0.72,0,1);}

/* ── BLOBS ── */
.blob{position:absolute;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);transition:background 0.7s,opacity 0.7s;}
.blob1{width:300px;height:300px;top:-100px;left:-60px;background:var(--cycle-accent);opacity:0.06;}
.blob2{width:240px;height:240px;bottom:140px;right:-50px;background:var(--plant-color);opacity:0.05;}
.ios-screen .blob1{opacity:0.05;filter:blur(90px);}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:18px;z-index:1;position:relative;}
.page-h1{font-size:22px;font-weight:800;color:var(--text);line-height:1.22;}
.page-sub{font-size:13px;font-weight:400;color:var(--text2);line-height:1.45;margin-top:4px;}

/* ── CONNECTOR ── */
.connector{
  font-size:13px;font-weight:500;color:var(--brand-real);
  margin-bottom:14px;z-index:1;position:relative;line-height:1.5;
}

/* ── HERO CARD (Weekly Review) ── */
.hero-card{
  background:var(--card);border:1.5px solid rgba(var(--plant-color-rgb),0.15);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:18px;margin-bottom:18px;z-index:1;position:relative;
  overflow:hidden;
}
.ios-screen .hero-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.hero-accent{
  position:absolute;top:0;right:0;width:100px;height:100px;
  border-radius:0 var(--r) 0 50%;
  background:rgba(var(--plant-color-rgb),0.06);
  transition:background 0.7s;
}
.hero-eyebrow{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  color:var(--plant-color);margin-bottom:8px;transition:color 0.7s;
}
.hero-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:6px;}
.hero-body{font-size:13px;font-weight:400;color:var(--text2);line-height:1.55;}
.hero-body em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text);font-size:14px;}
.hero-stats{display:flex;gap:10px;margin-top:14px;}
.hero-stat{
  flex:1;text-align:center;padding:10px 6px;
  border-radius:14px;background:rgba(var(--plant-color-rgb),0.06);
  transition:background 0.7s;
}
.hero-stat-num{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:22px;color:var(--plant-color);line-height:1;
  transition:color 0.7s;
}
.hero-stat-label{font-size:10px;font-weight:600;color:var(--text2);margin-top:3px;line-height:1.2;}

/* ── MOOD GRAPH ── */
.graph-section{margin-bottom:18px;z-index:1;position:relative;}
.graph-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:16px;overflow:hidden;
}
.ios-screen .graph-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.graph-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.graph-title{font-size:13px;font-weight:700;color:var(--text);}
.graph-period{font-size:11px;font-weight:500;color:var(--text3);padding:4px 10px;border-radius:999px;background:rgba(var(--plant-color-rgb),0.08);transition:background 0.7s;}

/* SVG chart area */
.chart-area{position:relative;height:140px;margin-bottom:8px;}
.chart-svg{width:100%;height:100%;}
.mood-line{
  fill:none;stroke:var(--plant-color);stroke-width:2.5;
  stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:600;animation:drawLine 2s ease-out both;
  transition:stroke 0.7s;
}
.mood-area{
  fill:url(#moodGrad);opacity:0.2;
  transition:opacity 0.5s;
}
.mood-dot{
  fill:var(--plant-color);
  transition:fill 0.7s;
  animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
/* Phase overlay bands */
.phase-band{opacity:0.08;transition:fill 0.5s;}
.chart-label{font-size:9px;fill:var(--text3);font-family:'Nunito',sans-serif;font-weight:600;}
.chart-mood-label{font-size:8px;fill:var(--text3);font-family:'Nunito',sans-serif;font-weight:500;}
.chart-phase-label{font-size:8px;font-family:'Nunito',sans-serif;font-weight:700;opacity:0.6;}

/* Graph legend */
.graph-legend{display:flex;gap:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--text2);}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── PATTERN CARDS ── */
.patterns-section{margin-bottom:18px;z-index:1;position:relative;}
.section-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;}
.pattern-card{
  padding:14px;border-radius:16px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:10px;
  display:flex;align-items:flex-start;gap:12px;
}
.ios-screen .pattern-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.85);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.pattern-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
}
.pattern-text{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}
.pattern-text em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--plant-color);font-size:14px;transition:color 0.7s;}
.pattern-sub{font-size:11px;font-weight:400;color:var(--text2);line-height:1.35;margin-top:3px;}

/* ── GROWTH CARD ── */
.growth-card{
  padding:16px;border-radius:var(--r);
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:18px;z-index:1;position:relative;
}
.ios-screen .growth-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.growth-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.growth-plant-mini{width:40px;height:40px;border-radius:12px;background:rgba(var(--plant-color-rgb),0.10);display:flex;align-items:center;justify-content:center;transition:background 0.7s;}
.growth-plant-mini svg{width:28px;height:28px;}
.growth-eyebrow{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--plant-color);transition:color 0.7s;}
.growth-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;}

/* Growth timeline */
.growth-timeline{display:flex;align-items:center;gap:0;margin-top:8px;}
.growth-stage{
  flex:1;display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.growth-stage::after{
  content:'';position:absolute;top:12px;left:50%;right:-50%;
  height:2px;background:var(--border);z-index:0;
}
.growth-stage:last-child::after{display:none;}
.growth-dot{
  width:24px;height:24px;border-radius:50%;
  background:var(--border);z-index:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
  transition:all 0.3s;
}
.growth-dot.reached{background:rgba(var(--plant-color-rgb),0.20);border:2px solid var(--plant-color);transition:border-color 0.7s,background 0.7s;}
.growth-dot.current{background:var(--plant-color);border:2px solid var(--plant-color);transition:background 0.7s,border-color 0.7s;animation:breatheSoft 3s ease-in-out infinite;}
.growth-dot.current::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(var(--plant-color-rgb),0.25);transition:border-color 0.7s;}
.growth-stage-label{font-size:9px;font-weight:600;color:var(--text3);margin-top:6px;text-align:center;}
.growth-stage.active .growth-stage-label{color:var(--plant-color);font-weight:700;transition:color 0.7s;}

/* ── SDIVIDER ── */
.sdivider{height:1px;background:var(--border);margin:6px 0 16px;z-index:1;position:relative;}

/* ── DISCLAIMER ── */
.disclaimer{
  font-size:11px;font-weight:400;color:var(--text3);
  line-height:1.5;text-align:center;z-index:1;position:relative;
  padding:0 12px;
}
.disclaimer em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text2);}

/* ── FAB PAUSE ── */
.fab-pause{
  position:absolute;bottom:78px;right:16px;z-index:15;
  width:52px;height:52px;border-radius:16px;
  background:var(--brand-warning);
  box-shadow:0 6px 20px rgba(255,208,122,0.35);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;
  transition:transform 0.2s;
}
.ios-screen .fab-pause{bottom:90px;border-radius:50%;}
.fab-pause:active{transform:scale(0.9);}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;z-index:20;
  pointer-events:none;
}
.a-screen .bottom-nav{
  height:68px;background:var(--card);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(61,44,46,0.05);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px;pointer-events:auto;
}
.a-screen .nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:16px;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.a-screen .nav-item.active{background:rgba(var(--plant-color-rgb),0.10);}
.a-screen .nav-item .nav-icon{font-size:20px;line-height:1;}
.a-screen .nav-item .nav-label{font-size:10px;font-weight:600;color:var(--text2);}
.a-screen .nav-item.active .nav-label{color:var(--plant-color);font-weight:700;}
.ios-screen .bottom-nav{
  bottom:20px;left:20px;right:20px;
  height:56px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(24px) saturate(180%);
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.45);
  box-shadow:0 8px 32px rgba(61,44,46,0.10),0 1px 0 rgba(255,255,255,0.60) inset;
  display:flex;align-items:center;justify-content:space-around;
  padding:0 12px;pointer-events:auto;
}
.ios-screen .nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 10px;cursor:pointer;transition:all 0.25s;
}
.ios-screen .nav-item .nav-icon{font-size:19px;line-height:1;}
.ios-screen .nav-item .nav-label{font-size:9.5px;font-weight:600;color:var(--text2);}
.ios-screen .nav-item.active .nav-label{color:var(--plant-color);font-weight:700;}
.nav-item.active .nav-icon{position:relative;}
.nav-item.active .nav-icon::after{
  content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--plant-color);
  transition:background 0.7s;
}

@media(max-width:820px){.stage{flex-direction:column;align-items:center;}}
</style>
</head>
<body>
<div class="studio">
  <div class="studio-header">
    <div class="brand-eyebrow">Brota</div>
    <div class="brand-title">A8 — Insights<em>Dashboard emocional &middot; sem julgamento &middot; ciclo overlay</em></div>
    <div class="brand-sub">Humor + redes + ciclo. Triplo overlay. Padroes descobertos. Nunca "voce falhou" — sempre "na sua proxima fase, voce tende a..."</div>
  </div>

  <div class="controls">
    <button class="state-btn active" onclick="setPlant('s1',this)">Lavanda</button>
    <button class="state-btn" onclick="setPlant('s2',this)">Girassol</button>
    <button class="state-btn" onclick="setPlant('s3',this)">Cacto</button>
    <button class="state-btn" onclick="setPlant('s4',this)">Cerejeira</button>
    <button class="state-btn" onclick="setPlant('s5',this)">Lotus</button>
    <div class="state-sep"></div>
    <button class="state-btn phase-btn active" onclick="setPhase('folicular',this)">Folicular</button>
    <button class="state-btn phase-btn" onclick="setPhase('luteal',this)">Luteal</button>
    <button class="state-btn phase-btn" onclick="setPhase('menstrual',this)">Menstrual</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

/* ═══════════════════════════════════════
   MOOD CHART (SVG)
   ═══════════════════════════════════════ */
function renderChart(prefix){
  var ph = phaseData[currentPhase];
  var area = document.getElementById(prefix+'-chartarea');
  if(!area) return;

  var W = 295, H = 120, padL = 24, padR = 8, padT = 8, padB = 22;
  var cW = W - padL - padR;
  var cH = H - padT - padB;
  var points = ph.moodPoints;
  var days = ['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];

  /* Scale points to chart */
  var maxV = 100, minV = 0;
  var coords = points.map(function(v,i){
    var x = padL + (i / (points.length - 1)) * cW;
    var y = padT + cH - ((v - minV) / (maxV - minV)) * cH;
    return {x:x, y:y};
  });

  var svg = '<svg viewBox="0 0 '+W+' '+H+'" class="chart-svg">';

  /* Defs */
  svg += '<defs>';
  svg += '<linearGradient id="moodGrad'+prefix+'" x1="0" y1="0" x2="0" y2="1">';
  svg += '<stop offset="0%" stop-color="'+currentPlant.color+'" stop-opacity="0.3"/>';
  svg += '<stop offset="100%" stop-color="'+currentPlant.color+'" stop-opacity="0.02"/>';
  svg += '</linearGradient>';
  svg += '</defs>';

  /* Phase overlay band */
  var bStart = padL + (ph.phaseOverlay.start / 6) * cW;
  var bEnd = padL + (ph.phaseOverlay.end / 6) * cW;
  svg += '<rect x="'+bStart+'" y="'+padT+'" width="'+(bEnd - bStart)+'" height="'+cH+'" rx="4" fill="'+ph.phaseOverlay.color+'" class="phase-band"/>';

  /* Phase label */
  var bMid = (bStart + bEnd) / 2;
  svg += '<text x="'+bMid+'" y="'+(padT+10)+'" text-anchor="middle" fill="'+ph.accent+'" class="chart-phase-label">'+ph.label+'</text>';

  /* Mood Y labels */
  var yLabels = [{v:20,l:'Pesado'},{v:50,l:'Meh'},{v:80,l:'Bem'}];
  yLabels.forEach(function(yl){
    var yy = padT + cH - ((yl.v - minV) / (maxV - minV)) * cH;
    svg += '<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="'+currentPlant.color+'" stroke-opacity="0.08" stroke-width="1"/>';
    svg += '<text x="'+(padL-3)+'" y="'+(yy+3)+'" text-anchor="end" class="chart-mood-label">'+yl.l+'</text>';
  });

  /* Area fill */
  var areaPath = 'M'+coords[0].x+','+coords[0].y;
  for(var i=1;i<coords.length;i++){
    var prev = coords[i-1], curr = coords[i];
    var cpx1 = prev.x + (curr.x - prev.x) * 0.4;
    var cpx2 = prev.x + (curr.x - prev.x) * 0.6;
    areaPath += ' C'+cpx1+','+prev.y+' '+cpx2+','+curr.y+' '+curr.x+','+curr.y;
  }
  areaPath += ' L'+coords[coords.length-1].x+','+(padT+cH)+' L'+coords[0].x+','+(padT+cH)+' Z';
  svg += '<path d="'+areaPath+'" fill="url(#moodGrad'+prefix+')" opacity="0.45"/>';

  /* Line */
  var linePath = 'M'+coords[0].x+','+coords[0].y;
  for(var j=1;j<coords.length;j++){
    var pv = coords[j-1], cv = coords[j];
    var cx1 = pv.x + (cv.x - pv.x) * 0.4;
    var cx2 = pv.x + (cv.x - pv.x) * 0.6;
    linePath += ' C'+cx1+','+pv.y+' '+cx2+','+cv.y+' '+cv.x+','+cv.y;
  }
  svg += '<path d="'+linePath+'" class="mood-line" style="stroke:'+currentPlant.color+'"/>';

  /* Dots + day labels */
  coords.forEach(function(c,idx){
    var delay = 0.8 + idx * 0.1;
    svg += '<circle cx="'+c.x+'" cy="'+c.y+'" r="4" class="mood-dot" style="fill:'+currentPlant.color+';animation-delay:'+delay+'s"/>';
    svg += '<text x="'+c.x+'" y="'+(padT+cH+14)+'" text-anchor="middle" class="chart-label">'+days[idx]+'</text>';
  });

  svg += '</svg>';
  area.innerHTML = svg;
}

/* ═══════════════════════════════════════
   STATE
   ═══════════════════════════════════════ */
function setPlant(key,btn){
  currentPlant = plants[key];
  document.querySelectorAll('.state-btn:not(.phase-btn)').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function setPhase(phase,btn){
  currentPhase = phase;
  document.querySelectorAll('.phase-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function applyState(){
  var s = currentPlant;
  var ph = phaseData[currentPhase];
  var r = document.documentElement;

  r.style.setProperty('--plant-color',s.color);
  r.style.setProperty('--plant-color-rgb',s.rgb);
  r.style.setProperty('--cycle-accent',ph.accent);
  r.style.setProperty('--cycle-accent-rgb',ph.accentRgb);

  ['a','i'].forEach(function(p){
    /* Connector */
    var conn = document.getElementById(p+'-conn');
    if(conn) conn.innerHTML = s.plant+': '+ph.weeklyTitle[s.plant];

    /* Hero card */
    var heroTitle = document.getElementById(p+'-herotitle');
    var heroBody = document.getElementById(p+'-herobody');
    if(heroTitle) heroTitle.textContent = ph.weeklyTitle[s.plant];
    if(heroBody) heroBody.innerHTML = ph.weeklyBody;

    /* Stats — vary by phase */
    var statData = {
      folicular:{s1:'5',s2:'3',s3:'82%'},
      luteal:{s1:'3',s2:'1',s3:'58%'},
      menstrual:{s1:'1',s2:'2',s3:'45%'}
    };
    var sd = statData[currentPhase];
    var stat1 = document.getElementById(p+'-stat1');
    var stat2 = document.getElementById(p+'-stat2');
    var stat3 = document.getElementById(p+'-stat3');
    if(stat1) stat1.textContent = sd.s1;
    if(stat2) stat2.textContent = sd.s2;
    if(stat3) stat3.textContent = sd.s3;

    /* Legend phase label */
    var legLabel = document.getElementById(p+'-legphaselabel');
    if(legLabel) legLabel.textContent = ph.label;

    /* Patterns */
    var patternsEl = document.getElementById(p+'-patterns');
    if(patternsEl){
      patternsEl.innerHTML = '';
      ph.patterns.forEach(function(pat){
        var html = '<div class="pattern-card">';
        html += '<div class="pattern-icon" style="background:'+pat.bg+'">'+pat.icon+'</div>';
        html += '<div><div class="pattern-text">'+pat.text+'</div>';
        html += '<div class="pattern-sub">'+pat.sub+'</div></div>';
        html += '</div>';
        patternsEl.innerHTML += html;
      });
    }

    /* Growth */
    var gtitle = document.getElementById(p+'-gtitle');
    if(gtitle) gtitle.textContent = s.plant+' — Estagio Jovem';

    /* Growth mini SVG */
    var gminisvg = document.getElementById(p+'-gminisvg');
    if(gminisvg){
      gminisvg.innerHTML = ''
        +'<circle cx="40" cy="40" r="18" fill="'+s.color+'" opacity="0.25"/>'
        +'<circle cx="40" cy="40" r="10" fill="'+s.color+'" opacity="0.45"/>'
        +'<circle cx="37" cy="38" r="1.5" fill="#4A3728"/>'
        +'<circle cx="43" cy="38" r="1.5" fill="#4A3728"/>'
        +'<path d="M38 42C39 43.5 41 43.5 42 42" stroke="#4A3728" stroke-width="1" stroke-linecap="round" fill="none"/>';
    }

    /* Chart */
    renderChart(p);
  });
}

/* ═══════════════════════════════════════
   INIT

renderStage();
applyState();
