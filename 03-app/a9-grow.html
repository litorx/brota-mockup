<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — Grow Tab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --shadow:0 2px 12px rgba(61,44,46,0.06);
  --shadow2:0 6px 24px rgba(61,44,46,0.10);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.scene-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;background:var(--bg);border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;background:var(--bg);}
.statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;}
.stime{font-size:15px;font-weight:700;color:var(--text);}
.sicons{display:flex;gap:5px;color:var(--text2);font-size:11px;}
.dyna{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:rgba(61,44,46,0.10);border-radius:999px;z-index:30;pointer-events:none;}
.a-screen .dyna{display:none;}

/* ── SCROLL BODY ── */
.scroll-body{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 20px 100px;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.scroll-body::-webkit-scrollbar{display:none;}
.scroll-body>*{flex-shrink:0;}
.ios-screen .scroll-body{top:0;padding-top:60px;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUpBounce{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
@keyframes shimmer{0%{transform:translateX(-200%) skewX(-14deg);}40%,100%{transform:translateX(200%) skewX(-14deg);}}
@keyframes glowSoft{0%,100%{opacity:0.5;transform:scale(0.94);}50%{opacity:0.8;transform:scale(1.02);}}
@keyframes plantBreathe{
  0%,100%{transform:translateY(0) scale(1);}
  25%{transform:translateY(-3px) scale(1.02);}
  75%{transform:translateY(-1px) scale(1.01);}
}
@keyframes journeyPulse{0%,100%{box-shadow:0 0 0 0 rgba(var(--plant-color-rgb),0.15);}50%{box-shadow:0 0 0 6px rgba(var(--plant-color-rgb),0);}}
@keyframes celebrateBounce{
  0%{transform:scale(1);}25%{transform:scale(1.08);}50%{transform:scale(0.95);}100%{transform:scale(1);}
}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0);}50%{opacity:0.8;transform:scale(1);}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

.anim-el{opacity:0;animation:fadeUpBounce 0.50s cubic-bezier(0.34,1.56,0.64,1) both;}
.ios-screen .anim-el{animation-name:fadeUp;animation-timing-function:cubic-bezier(0.32,0.72,0,1);}

/* ── BLOBS ── */
.blob{position:absolute;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);transition:background 0.7s,opacity 0.7s;}
.blob1{width:300px;height:300px;top:-100px;left:-60px;background:var(--brand-ai);opacity:0.06;}
.blob2{width:240px;height:240px;bottom:100px;right:-40px;background:var(--plant-color);opacity:0.05;}
.blob3{width:180px;height:180px;top:300px;right:-30px;background:var(--brand-real);opacity:0.035;}
.ios-screen .blob1{opacity:0.05;filter:blur(90px);}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:4px;z-index:1;position:relative;}
.page-h1{font-size:22px;font-weight:800;color:var(--text);line-height:1.22;}
.page-sub{font-size:13px;font-weight:400;color:var(--text2);line-height:1.45;margin-top:4px;}

/* ── CONNECTOR ── */
.connector{
  font-size:13px;font-weight:500;color:var(--brand-real);
  margin-bottom:16px;z-index:1;position:relative;line-height:1.5;
}

/* ── LUTEAL BANNER ── */
.luteal-banner{
  display:none;padding:12px 14px;border-radius:16px;
  background:rgba(196,176,224,0.08);border:1px solid rgba(196,176,224,0.12);
  margin-bottom:14px;z-index:1;position:relative;
  align-items:flex-start;gap:10px;
}
.luteal-banner.visible{display:flex;}
.ios-screen .luteal-banner{
  backdrop-filter:blur(10px) saturate(120%);
  background:rgba(255,255,255,0.70);border:1px solid rgba(196,176,224,0.15);
  box-shadow:0 1px 0 rgba(255,255,255,0.50) inset;
}
.luteal-icon{font-size:18px;flex-shrink:0;line-height:1.4;}
.luteal-text{font-size:12.5px;font-weight:400;color:var(--text2);line-height:1.5;}
.luteal-text em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text);font-size:13px;}

/* ═══════════════════════════════════════
   JOURNEY CARD — Feed Cleanse visual
   ═══════════════════════════════════════ */
.journey-card{
  background:var(--card);border:1.5px solid rgba(var(--plant-color-rgb),0.15);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:0;margin-bottom:16px;z-index:1;position:relative;
  overflow:hidden;transition:border-color 0.7s;
}
.ios-screen .journey-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}

/* Journey hero — plant + gradient bg */
.journey-hero{
  position:relative;padding:20px 18px 16px;
  background:linear-gradient(180deg, rgba(var(--plant-color-rgb),0.08) 0%, transparent 100%);
  display:flex;align-items:center;gap:14px;
  transition:background 0.7s;
}
.journey-plant-wrap{
  width:72px;height:72px;flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.journey-plant-wrap::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle, rgba(var(--plant-color-rgb),0.15) 0%, transparent 70%);
  animation:glowSoft 4s ease-in-out infinite;
  transition:background 0.7s;
}
.journey-plant-svg{
  position:relative;z-index:1;width:56px;height:56px;
  animation:plantBreathe 4.5s ease-in-out infinite;
  filter:drop-shadow(0 4px 12px rgba(var(--plant-color-rgb),0.25));
  transition:filter 0.7s;
}
.journey-info{flex:1;min-width:0;}
.journey-eyebrow{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;
  color:var(--plant-color);margin-bottom:3px;transition:color 0.7s;
}
.journey-title{font-size:15.5px;font-weight:800;color:var(--text);line-height:1.25;margin-bottom:3px;}
.journey-title em{font-style:italic;font-family:'Instrument Serif',serif;font-weight:400;font-size:16px;}
.journey-sub{font-size:11.5px;font-weight:400;color:var(--text2);line-height:1.4;}

/* Journey path — the 7 day visual */
.journey-path{padding:0 18px 18px;}
.journey-days{display:flex;align-items:center;gap:0;margin-bottom:10px;}
.jday{
  flex:1;display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.jday::after{
  content:'';position:absolute;top:13px;left:50%;right:-50%;
  height:2.5px;background:var(--border);z-index:0;
  transition:background 0.4s;
}
.jday:last-child::after{display:none;}
.jday.done::after{background:rgba(var(--plant-color-rgb),0.3);transition:background 0.7s;}
.jdot{
  width:26px;height:26px;border-radius:50%;z-index:1;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--text3);
  background:var(--bg);border:2px solid var(--border);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
.jday.done .jdot{
  background:var(--plant-color);border-color:var(--plant-color);
  color:white;font-size:11px;
  transition:background 0.7s,border-color 0.7s;
}
.jday.current .jdot{
  background:var(--bg);border-color:var(--plant-color);
  color:var(--plant-color);font-weight:800;
  box-shadow:0 0 0 4px rgba(var(--plant-color-rgb),0.15);
  animation:journeyPulse 2s ease-in-out infinite;
  transition:border-color 0.7s,color 0.7s;
}
.jday-label{
  font-size:8px;font-weight:600;color:var(--text3);
  margin-top:4px;text-align:center;white-space:nowrap;
}
.jday.current .jday-label{color:var(--plant-color);font-weight:700;transition:color 0.7s;}
.jday.done .jday-label{color:var(--text2);}

/* Today's task */
.journey-task{
  padding:14px;border-radius:14px;
  background:rgba(var(--plant-color-rgb),0.05);
  border:1px solid rgba(var(--plant-color-rgb),0.10);
  margin-bottom:12px;transition:all 0.7s;
}
.ios-screen .journey-task{
  backdrop-filter:blur(6px) saturate(120%);
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(var(--plant-color-rgb),0.12);
}
.jtask-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--plant-color);margin-bottom:4px;transition:color 0.7s;}
.jtask-text{font-size:13px;font-weight:500;color:var(--text);line-height:1.45;}
.jtask-text em{font-style:italic;font-family:'Instrument Serif',serif;font-size:14px;}

/* Journey CTA */
.journey-cta{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:12px;border-radius:14px;border:none;cursor:pointer;
  background:var(--plant-color);color:white;
  font-family:inherit;font-size:14px;font-weight:700;
  box-shadow:0 4px 16px rgba(var(--plant-color-rgb),0.25);
  transition:transform 0.2s,background 0.7s,box-shadow 0.7s;
  position:relative;overflow:hidden;
}
.a-screen .journey-cta::after{
  content:'';position:absolute;top:0;left:0;bottom:0;width:55%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.20),transparent);
  transform:translateX(-200%) skewX(-14deg);
  animation:shimmer 4s ease-in-out 2s infinite;
  pointer-events:none;
}
.ios-screen .journey-cta{
  backdrop-filter:blur(20px) saturate(180%);
  background:rgba(var(--plant-color-rgb),0.85);
  border:1px solid rgba(var(--plant-color-rgb),0.40);
  box-shadow:0 1px 0 rgba(255,255,255,0.30) inset,0 4px 16px rgba(var(--plant-color-rgb),0.20);
}
.journey-cta:hover{transform:scale(1.01);}
.journey-cta:active{transform:scale(0.98);}

/* Complete state */
.journey-complete{
  text-align:center;padding:20px 18px;
}
.journey-complete-plant{
  width:80px;height:80px;margin:0 auto 10px;
  animation:celebrateBounce 1.5s ease-in-out;
  filter:drop-shadow(0 4px 16px rgba(var(--plant-color-rgb),0.30));
  transition:filter 0.7s;
}
.journey-complete-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
.journey-complete-sub{font-size:12.5px;font-weight:400;color:var(--text2);line-height:1.45;}
.journey-complete-sub em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text);font-size:13.5px;}

/* ═══════════════════════════════════════
   INNER VOICE CARD
   ═══════════════════════════════════════ */
.iv-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:18px;margin-bottom:16px;z-index:1;position:relative;
  overflow:hidden;cursor:pointer;transition:all 0.25s;
}
.iv-card:hover{border-color:rgba(var(--plant-color-rgb),0.25);box-shadow:var(--shadow2);}
.ios-screen .iv-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.iv-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.iv-plant{width:44px;height:44px;flex-shrink:0;animation:plantBreathe 5s ease-in-out infinite;
  filter:drop-shadow(0 3px 8px rgba(var(--plant-color-rgb),0.20));transition:filter 0.7s;}
.iv-info{flex:1;}
.iv-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--plant-color);transition:color 0.7s;}
.iv-title{font-size:14.5px;font-weight:700;color:var(--text);line-height:1.3;margin-top:2px;}
.iv-arrow{color:var(--text3);font-size:18px;flex-shrink:0;margin-left:auto;}

/* Chat preview bubbles */
.iv-preview{display:flex;flex-direction:column;gap:6px;}
.iv-bubble{
  padding:9px 13px;border-radius:14px 14px 14px 4px;
  background:rgba(var(--plant-color-rgb),0.08);
  font-size:12px;font-weight:400;color:var(--text);line-height:1.4;
  max-width:85%;align-self:flex-start;
  transition:background 0.7s;
}
.iv-bubble em{font-style:italic;font-family:'Instrument Serif',serif;font-size:12.5px;}
.iv-bubble.user{
  border-radius:14px 14px 4px 14px;
  background:rgba(var(--plant-color-rgb),0.15);
  align-self:flex-end;color:var(--text2);font-style:italic;
}
.ios-screen .iv-bubble{
  backdrop-filter:blur(6px) saturate(120%);
  background:rgba(255,255,255,0.60);
}
.ios-screen .iv-bubble.user{background:rgba(var(--plant-color-rgb),0.12);}

/* ═══════════════════════════════════════
   EXERCISE SECTION
   ═══════════════════════════════════════ */
.section-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;z-index:1;position:relative;}
.sdivider{height:1px;background:var(--border);margin:4px 0 16px;z-index:1;position:relative;}

.exercise-scroll{
  display:flex;gap:10px;overflow-x:auto;
  margin-bottom:6px;z-index:1;position:relative;
  padding-bottom:4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.exercise-scroll::-webkit-scrollbar{display:none;}

.ex-card{
  min-width:120px;max-width:130px;
  padding:16px 12px 14px;border-radius:18px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);flex-shrink:0;
  cursor:pointer;transition:all 0.25s;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;position:relative;overflow:hidden;
}
.ex-card:hover{border-color:rgba(var(--plant-color-rgb),0.25);transform:translateY(-3px);box-shadow:var(--shadow2);}
.ios-screen .ex-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.85);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.ex-glow{
  position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  width:60px;height:60px;border-radius:50%;
  opacity:0.08;transition:background 0.7s;
}
.ex-icon-wrap{
  width:48px;height:48px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;position:relative;z-index:1;
}
.ex-icon{font-size:24px;line-height:1;}
.ex-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.25;margin-bottom:3px;position:relative;z-index:1;}
.ex-desc{font-size:10px;font-weight:400;color:var(--text3);line-height:1.3;position:relative;z-index:1;}
.ex-time{
  margin-top:8px;padding:3px 10px;border-radius:999px;
  background:rgba(var(--plant-color-rgb),0.08);
  font-size:9.5px;font-weight:700;color:var(--plant-color);
  position:relative;z-index:1;
  transition:background 0.7s,color 0.7s;
}

/* ═══════════════════════════════════════
   LIBRARY CARD
   ═══════════════════════════════════════ */
.library-card{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:16px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:14px;z-index:1;position:relative;
  cursor:pointer;transition:all 0.25s;
}
.library-card:hover{border-color:rgba(var(--plant-color-rgb),0.25);}
.ios-screen .library-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.85);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.lib-icon{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.lib-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;}
.lib-desc{font-size:11px;font-weight:400;color:var(--text2);margin-top:1px;}
.lib-arrow{margin-left:auto;color:var(--text3);font-size:16px;flex-shrink:0;}

/* ── FAB PAUSE ── */
.fab-pause{
  position:absolute;bottom:80px;right:16px;z-index:15;
  width:48px;height:48px;border-radius:50%;
  background:var(--brand-real);color:white;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
  box-shadow:0 4px 20px rgba(244,167,185,0.30);
  transition:transform 0.2s;
}
.fab-pause:active{transform:scale(0.9);}
.ios-screen .fab-pause{
  bottom:92px;right:18px;
  backdrop-filter:blur(20px) saturate(180%);
  background:rgba(232,136,158,0.88);
  border:1px solid rgba(255,255,255,0.30);
  box-shadow:0 1px 0 rgba(255,255,255,0.30) inset,0 4px 20px rgba(244,167,185,0.28);
}

/* ── BOTTOM NAV ── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;z-index:20;pointer-events:none;}
.a-screen .bottom-nav{
  height:68px;background:var(--card);border-top:1px solid var(--border);
  box-shadow:0 -2px 12px rgba(61,44,46,0.05);
  display:flex;align-items:center;justify-content:space-around;padding:0 8px;pointer-events:auto;
}
.a-screen .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:16px;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.a-screen .nav-item.active{background:rgba(var(--plant-color-rgb),0.10);}
.a-screen .nav-item .nav-icon{font-size:20px;line-height:1;}

  if(btn) btn.classList.add('active');
  applyState();
}

function applyState(){
  var s = currentPlant;
  var sc = scenes[currentScene];
  var r = document.documentElement;
  var isComplete = currentScene === 'complete';
  var isLuteal = currentScene === 'luteal';

  r.style.setProperty('--plant-color',s.color);
  r.style.setProperty('--plant-color-rgb',s.rgb);

  var plantSvg = miniSVGs[s.plant].replace(/__CLR__/g, s.color);

  ['a','i'].forEach(function(p){
    /* Connector */
    var conn = document.getElementById(p+'-conn');
    if(conn) conn.textContent = sc.conn[s.plant];

    /* Luteal */
    var luteal = document.getElementById(p+'-luteal');
    if(luteal) luteal.classList.toggle('visible', isLuteal);

    /* Journey plant */
    var jplant = document.getElementById(p+'-jplant');
    if(jplant) jplant.innerHTML = plantSvg;

    /* Journey eyebrow */
    var jeye = document.getElementById(p+'-jeye');
    if(jeye){
      if(isComplete) jeye.textContent = 'Missao completa!';
      else if(isLuteal) jeye.textContent = 'Limpa seu feed \u00b7 versao gentil';
      else jeye.textContent = 'Limpa seu feed \u00b7 7 dias';
    }

    /* Journey title */
    var jtitle = document.getElementById(p+'-jtitle');
    if(jtitle){
      if(isComplete) jtitle.innerHTML = 'Dia 7: <em>'+dayTitles[6]+'</em>';
      else jtitle.innerHTML = 'Dia '+(sc.doneCount+1)+': <em>'+dayTitles[sc.doneCount]+'</em>';
    }

    /* Journey days */
    var jdays = document.getElementById(p+'-jdays');
    if(jdays){
      jdays.innerHTML = '';
      for(var d=0;d<7;d++){
        var state = '';
        if(d < sc.doneCount) state = 'done';
        else if(d === sc.doneCount && !isComplete) state = 'current';
        else if(isComplete) state = 'done';

        var dayHtml = '<div class="jday '+state+'">';
        if(state === 'done') dayHtml += '<div class="jdot">&#10003;</div>';
        else dayHtml += '<div class="jdot">'+(d+1)+'</div>';
        dayHtml += '<div class="jday-label">'+dayTitles[d].split(' ').slice(0,2).join(' ')+'</div>';
        dayHtml += '</div>';
        jdays.innerHTML += dayHtml;
      }
    }

    /* Journey path vs complete */
    var jpath = document.getElementById(p+'-jpath');
    var jcomplete = document.getElementById(p+'-jcomplete');
    if(isComplete){
      if(jpath) jpath.style.display = 'none';
      if(jcomplete){
        jcomplete.style.display = 'block';
        var jcplant = document.getElementById(p+'-jcplant');
        if(jcplant) jcplant.innerHTML = plantSvg;
        var jctitle = document.getElementById(p+'-jctitle');
        if(jctitle) jctitle.textContent = s.plant+' ta orgulhosa de voce.';
      }
    } else {
      if(jpath) jpath.style.display = 'block';
      if(jcomplete) jcomplete.style.display = 'none';

      var jtask = document.getElementById(p+'-jtask');
      var jtlabel = document.getElementById(p+'-jtlabel');
      var jttext = document.getElementById(p+'-jttext');
      if(jtlabel) jtlabel.textContent = sc.taskLabel;
      if(jttext) jttext.innerHTML = sc.task;

      var jcta = document.getElementById(p+'-jcta');
      if(jcta) jcta.textContent = sc.cta;
    }

    /* Inner Voice */
    var ivtitle = document.getElementById(p+'-ivtitle');
    if(ivtitle) ivtitle.textContent = 'Escrever com sua '+s.plant;
    var ivplant = document.getElementById(p+'-ivplant');
    if(ivplant) ivplant.innerHTML = plantSvg;
    var ivbubble = document.getElementById(p+'-ivbubble');
    if(ivbubble) ivbubble.innerHTML = s.plant+': '+sc.ivBubble;
    var ivresp = document.getElementById(p+'-ivresp');
    if(ivresp){
      if(sc.ivResponse){
        ivresp.style.display = 'block';
        ivresp.textContent = sc.ivResponse;
      } else {
        ivresp.style.display = 'none';
      }
    }

    /* Exercises */
    var exEl = document.getElementById(p+'-exercises');
    if(exEl){
      exEl.innerHTML = '';
      var exList = isLuteal ? exerciseData.luteal : exerciseData.normal;
      exList.forEach(function(ex){
        var html = '<div class="ex-card">';
        html += '<div class="ex-glow" style="background:'+ex.glow+'"></div>';
        html += '<div class="ex-icon-wrap" style="background:'+ex.bg+'"><div class="ex-icon">'+ex.icon+'</div></div>';
        html += '<div class="ex-title">'+ex.title+'</div>';
        html += '<div class="ex-desc">'+ex.desc+'</div>';
        html += '<div class="ex-time">'+ex.time+'</div>';
        html += '</div>';
        exEl.innerHTML += html;
      });
    }
  });
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderStage();
applyState();
</script>
<script src="../shared/icons.js"></script>
