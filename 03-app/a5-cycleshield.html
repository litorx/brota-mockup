<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — A5: Cycle Shield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand-real:#F4A7B9;--brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2;--brand-ai-deep:#7EBF78;
  --brand-correct:#7DD4A3;--brand-warning:#FFD07A;
  --bg:#FFF8F2;--bg2:#FFF0E8;--card:#FFFFFF;
  --text:#3D2C2E;--text2:#9B8A8C;--text3:#C4B5B7;
  --border:rgba(61,44,46,0.08);
  --shadow:0 2px 12px rgba(61,44,46,0.06);
  --shadow2:0 6px 24px rgba(61,44,46,0.10);
  --plant-color:#C4B0E0;--plant-color-rgb:196,176,224;
  --phase-accent:#F4A7B9;--phase-accent-rgb:244,167,185;
  --r:20px;
}
body{background:#F4F2EF;color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;}

/* ── STUDIO ── */
.studio{max-width:1260px;margin:0 auto;padding:40px 24px 64px;}
.studio-header{text-align:center;margin-bottom:28px;}
.brand-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.brand-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;}
.brand-title em{font-style:normal;font-size:12px;font-weight:500;color:var(--text3);display:block;margin-top:4px;}
.brand-sub{font-size:12.5px;color:var(--text2);line-height:1.65;max-width:720px;margin:0 auto;}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:36px;}
.state-sep{width:1px;height:20px;background:var(--border);}
.state-btn{padding:7px 18px;border:1.5px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.25s;}
.state-btn.active{background:var(--brand-real);color:white;border-color:var(--brand-real);}
.state-btn:hover:not(.active){border-color:var(--brand-real);color:var(--brand-real-deep);}
.state-btn.phase-btn.active{background:var(--brand-ai);border-color:var(--brand-ai);}
.stage{display:flex;gap:56px;justify-content:center;align-items:flex-start;}

/* ── PHONE ── */
.phone-wrapper{display:flex;flex-direction:column;align-items:center;gap:16px;}
.phone-label{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;}
.pill{display:inline-flex;align-items:center;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;}
.pill.android{background:linear-gradient(135deg,#34A853,#4285F4);color:white;}
.pill.ios{background:linear-gradient(135deg,#1C1C1E,#48484A);color:white;}
.phone-label .desc{font-size:11.5px;color:var(--text3);max-width:280px;line-height:1.4;}
.phone{width:375px;height:740px;background:var(--bg);border-radius:48px;box-shadow:0 24px 80px rgba(61,44,46,0.12),0 0 0 1px rgba(61,44,46,0.06);overflow:hidden;position:relative;}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;background:var(--bg);}
.statusbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:absolute;top:0;left:0;right:0;z-index:10;pointer-events:none;}
.stime{font-size:15px;font-weight:700;color:var(--text);}
.sicons{display:flex;gap:5px;color:var(--text2);font-size:11px;}
.dyna{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:34px;background:rgba(61,44,46,0.10);border-radius:999px;z-index:30;pointer-events:none;}
.a-screen .dyna{display:none;}

/* ── SCROLL BODY ── */
.scroll-body{
  position:absolute;top:44px;left:0;right:0;bottom:0;
  overflow-y:auto;overflow-x:hidden;
  padding:16px 20px 40px;
  display:flex;flex-direction:column;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.scroll-body::-webkit-scrollbar{display:none;}
.scroll-body>*{flex-shrink:0;}
.ios-screen .scroll-body{top:0;padding-top:60px;}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes fadeUpBounce{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:none;}}
@keyframes glowSoft{0%,100%{opacity:0.5;transform:scale(0.94);}50%{opacity:0.8;transform:scale(1.02);}}
@keyframes phasePulse{0%,100%{box-shadow:0 0 0 0 rgba(var(--phase-accent-rgb),0.15);}50%{box-shadow:0 0 0 8px rgba(var(--phase-accent-rgb),0.0);}}
@keyframes dotGlow{0%,100%{transform:scale(1);filter:brightness(1);}50%{transform:scale(1.3);filter:brightness(1.2);}}
@keyframes shimmer{0%{transform:translateX(-200%) skewX(-14deg);}40%,100%{transform:translateX(200%) skewX(-14deg);}}
@keyframes breatheWheel{0%,100%{transform:scale(1);}50%{transform:scale(1.015);}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

/* ── ANIM ── */
.anim-el{opacity:0;animation:fadeUpBounce 0.50s cubic-bezier(0.34,1.56,0.64,1) both;}
.ios-screen .anim-el{animation-name:fadeUp;animation-timing-function:cubic-bezier(0.32,0.72,0,1);}

/* ── BLOBS ── */
.blob{position:absolute;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);transition:background 0.7s,opacity 0.7s;}
.blob1{width:300px;height:300px;top:-100px;right:-60px;background:var(--phase-accent);opacity:0.07;}
.blob2{width:240px;height:240px;bottom:100px;left:-50px;background:var(--plant-color);opacity:0.05;}
.ios-screen .blob1{opacity:0.06;filter:blur(90px);}

/* ── BACK HEADER ── */
.back-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;z-index:1;position:relative;
}
.back-btn{
  width:36px;height:36px;border-radius:12px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:var(--card);box-shadow:var(--shadow);
  transition:all 0.2s;
}
.ios-screen .back-btn{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.80);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.back-btn:hover{transform:scale(1.05);}
.back-btn svg{width:18px;height:18px;color:var(--text);}
.back-title{font-size:18px;font-weight:800;color:var(--text);}

/* ── CONNECTOR ── */
.connector{
  font-size:13px;font-weight:500;color:var(--brand-real);
  margin-bottom:6px;z-index:1;position:relative;line-height:1.5;
}

/* ── CYCLE WHEEL ── */
.wheel-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:24px;z-index:1;position:relative;
}
.wheel-container{
  position:relative;width:220px;height:220px;
  animation:breatheWheel 6s ease-in-out infinite;
}
.wheel-bg{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle, rgba(var(--phase-accent-rgb),0.06) 0%, transparent 70%);
}
.wheel-dot{
  position:absolute;width:10px;height:10px;border-radius:50%;
  background:var(--border);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.wheel-dot.phase-dot{background:rgba(var(--phase-accent-rgb),0.35);}
.wheel-dot.current{
  background:var(--phase-accent);
  width:14px;height:14px;margin:-2px;
  box-shadow:0 0 8px rgba(var(--phase-accent-rgb),0.4);
  animation:dotGlow 2s ease-in-out infinite;
}
.wheel-dot.past{background:rgba(var(--phase-accent-rgb),0.55);}
.wheel-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.wheel-day{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:36px;color:var(--phase-accent);line-height:1;
  transition:color 0.5s;
}
.wheel-day-label{font-size:11px;font-weight:600;color:var(--text3);margin-top:2px;}
.wheel-phase-name{
  font-size:13px;font-weight:700;color:var(--phase-accent);
  margin-top:10px;text-align:center;
  transition:color 0.5s;
}

/* ── PHASE CARD ── */
.phase-card{
  background:var(--card);border:1.5px solid rgba(var(--phase-accent-rgb),0.18);
  border-radius:var(--r);box-shadow:var(--shadow);
  padding:18px;margin-bottom:16px;z-index:1;position:relative;
  overflow:hidden;transition:border-color 0.5s;
}
.ios-screen .phase-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.phase-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.phase-icon{
  width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(var(--phase-accent-rgb),0.12);
  transition:background 0.5s;
}
.phase-icon .plant-mini{width:28px;height:28px;}
.phase-card-eyebrow{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--phase-accent);transition:color 0.5s;}
.phase-card-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;}
.phase-card-body{font-size:13px;font-weight:400;color:var(--text2);line-height:1.55;}
.phase-card-body em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text);font-size:14px;}
.phase-card-accent{
  position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 var(--r) 0 50%;
  background:rgba(var(--phase-accent-rgb),0.06);
  transition:background 0.5s;
}

/* ── ADAPTATION CARDS ── */
.adapt-section{margin-bottom:20px;z-index:1;position:relative;}
.adapt-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;}
.adapt-grid{display:flex;flex-direction:column;gap:10px;}
.adapt-card{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px;border-radius:16px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);
  transition:all 0.3s;
}
.ios-screen .adapt-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.85);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.adapt-icon{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
}
.adapt-label{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.adapt-desc{font-size:11.5px;font-weight:400;color:var(--text2);line-height:1.4;}

/* ── DATA INSIGHTS ── */
.data-section{margin-bottom:20px;z-index:1;position:relative;}
.data-card{
  padding:16px;border-radius:var(--r);
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:10px;
}
.ios-screen .data-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.88);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.60) inset;
}
.data-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--phase-accent);margin-bottom:8px;transition:color 0.5s;}
.data-insight{font-size:14px;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:6px;}
.data-insight em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--phase-accent);font-size:15px;transition:color 0.5s;}
.data-sub{font-size:11.5px;font-weight:400;color:var(--text2);line-height:1.4;}

/* ── MINI BAR CHART ── */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:48px;margin:12px 0 6px;}
.mini-bar{
  flex:1;border-radius:4px 4px 0 0;min-height:4px;
  background:rgba(var(--phase-accent-rgb),0.2);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
.mini-bar.highlight{background:var(--phase-accent);transition:background 0.5s;}
.mini-bar-label{
  position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
  font-size:8px;font-weight:600;color:var(--text3);white-space:nowrap;
}

/* ── CONFIG SECTION ── */
.config-section{z-index:1;position:relative;margin-bottom:16px;}
.config-card{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-radius:16px;
  background:var(--card);border:1px solid var(--border);
  box-shadow:var(--shadow);margin-bottom:8px;
  cursor:pointer;transition:all 0.25s;
}
.ios-screen .config-card{
  backdrop-filter:blur(10px) saturate(130%);
  background:rgba(255,255,255,0.85);
  box-shadow:var(--shadow),0 1px 0 rgba(255,255,255,0.50) inset;
}
.config-card:hover{border-color:rgba(var(--phase-accent-rgb),0.25);}
.config-left{display:flex;align-items:center;gap:12px;}
.config-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.config-label{font-size:13px;font-weight:700;color:var(--text);}
.config-desc{font-size:11px;font-weight:400;color:var(--text2);}
.config-arrow{color:var(--text3);font-size:16px;}

/* Toggle */
.toggle{
  width:44px;height:26px;border-radius:13px;
  background:var(--brand-ai);position:relative;cursor:pointer;
  flex-shrink:0;transition:background 0.3s;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:21px;
  width:20px;height:20px;border-radius:50%;
  background:white;box-shadow:0 1px 4px rgba(0,0,0,0.15);
  transition:left 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.toggle.off{background:var(--text3);}
.toggle.off::after{left:3px;}

/* ── SECTION DIVIDER ── */
.sdivider{height:1px;background:var(--border);margin:8px 0 16px;z-index:1;position:relative;}

/* ── DISCLAIMER ── */
.disclaimer{
  font-size:11px;font-weight:400;color:var(--text3);
  line-height:1.5;text-align:center;z-index:1;position:relative;
  padding:0 12px;
}
.disclaimer em{font-style:italic;font-family:'Instrument Serif',serif;color:var(--text2);}

@media(max-width:820px){
  .stage{flex-direction:column;align-items:center;}
}
</style>
</head>
<body>
<div class="studio">
  <div class="studio-header">
    <div class="brand-eyebrow">Brota</div>
    <div class="brand-title">A5 — Cycle Shield<em>Central de controle do ciclo &middot; acessada via Perfil</em></div>
    <div class="brand-sub">Cycle wheel (28 dias) + fase atual + adaptacoes ativas + dados de correlacao. O ciclo informa, nao determina.</div>
  </div>

  <div class="controls">
    <button class="state-btn active" onclick="setPlant('s1',this)">Lavanda</button>
    <button class="state-btn" onclick="setPlant('s2',this)">Girassol</button>
    <button class="state-btn" onclick="setPlant('s3',this)">Cacto</button>
    <button class="state-btn" onclick="setPlant('s4',this)">Cerejeira</button>
    <button class="state-btn" onclick="setPlant('s5',this)">Lotus</button>
    <div class="state-sep"></div>
    <button class="state-btn phase-btn active" onclick="setPhase('folicular',this)">Folicular</button>
    <button class="state-btn phase-btn" onclick="setPhase('ovulacao',this)">Ovulacao</button>
    <button class="state-btn phase-btn" onclick="setPhase('luteal',this)">Luteal</button>
    <button class="state-btn phase-btn" onclick="setPhase('menstrual',this)">Menstrual</button>
  </div>

  <div class="stage" id="stage"></div>
</div>

<script>
/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
var plants = {
  s1:{name:'Ana',  plant:'Lavanda',   color:'#C4B0E0',rgb:'196,176,224'},

  s3:{name:'Carol',plant:'Cacto',     color:'#8CC5A0',rgb:'140,197,160'},

  s5:{name:'Eva',  plant:'Lotus',     color:'#D4B8D4',rgb:'212,184,212'}
};

var phases = {
  folicular:{

    day:9,totalRange:[6,13],

    speech:{

    },
    adaptCards:[

      {icon:'<i data-icon="grow"></i>',bg:'rgba(168,213,162,0.12)',label:'Tom animado',desc:'Sua planta ta energetica e motivacional.'},

      {icon:'<i data-icon="sun"></i>',bg:'rgba(244,167,185,0.12)',label:'Daily Bloom ativo',desc:'Micro-detox e movimento. Desafios maiores.'}
    ]
  },
  ovulacao:{
    label:'Ovulacao',
    day:14,totalRange:[14,16],
    accent:'#FFDBA8',accentRgb:'255,219,168',
    speech:{
      Lavanda:'Voce ta brilhando. Nao precisa de validacao externa.',
      Girassol:'OLHA voce! Confiante demais!',
      Cacto:'Ta bem, ne? Da pra ver.',
      Cerejeira:'Que presenca bonita voce tem nesses dias.',

    },
    adaptCards:[
      {icon:'<i data-icon="shield"></i>',bg:'rgba(255,219,168,0.12)',label:'Protecao normal',desc:'Frequencia configurada. Voce ta forte.'},
      {icon:'<i data-icon="grow"></i>',bg:'rgba(168,213,162,0.12)',label:'Tom confiante',desc:'Sua planta te empodera e celebra.'},

  luteal:{

    accent:'#C4B0E0',accentRgb:'196,176,224',

    },
    adaptCards:[
      {icon:'<i data-icon="shield"></i>',bg:'rgba(196,176,224,0.15)',label:'Protecao aumentada',desc:'Mirror aparece na primeira abertura. Mensagem mais protetora.'},
      {icon:'<i data-icon="grow"></i>',bg:'rgba(196,176,224,0.12)',label:'Tom gentil',desc:'Sua planta valida sem desafiar. Colo.'},
      {icon:'<i data-icon="wind"></i>',bg:'rgba(196,176,224,0.12)',label:'Pausa mais lenta',desc:'Respiracao 5-5-7. Grounding + Inner Voice sugerido.'},
      {icon:'<i data-icon="sun"></i>',bg:'rgba(196,176,224,0.12)',label:'Daily Bloom suave',desc:'Body functionality e descanso. Sem esforco.'}

  menstrual:{
    label:'Menstrual',

    },
    adaptCards:[
      {icon:'<i data-icon="shield"></i>',bg:'rgba(242,213,213,0.18)',label:'Protecao ultra-suave',desc:'Mirror na primeira abertura. Mensagem de colo puro.'},

/* ═══════════════════════════════════════
   WHEEL DOTS
   ═══════════════════════════════════════ */
function renderWheel(prefix){
  var ph = phases[currentPhase];
  var container = document.getElementById(prefix+'-wheel');
  /* Remove old dots */
  container.querySelectorAll('.wheel-dot').forEach(function(d){d.remove();});

  var cx = 110, cy = 110, radius = 92;
  for(var i = 1; i <= 28; i++){
    var angle = ((i - 1) / 28) * Math.PI * 2 - Math.PI / 2;
    var x = cx + radius * Math.cos(angle) - 5;
    var y = cy + radius * Math.sin(angle) - 5;

    var dot = document.createElement('div');
    dot.className = 'wheel-dot';

    /* Determine dot state */
    var inPhase = i >= ph.totalRange[0] && i <= ph.totalRange[1];
    var isCurrent = i === ph.day;
    var isPast = i < ph.day;

    if(isCurrent){
      dot.classList.add('current');
      x -= 2; y -= 2; /* offset for larger size */
    } else if(inPhase && isPast){
      dot.classList.add('past');
    } else if(inPhase){
      dot.classList.add('phase-dot');
    }

    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    container.appendChild(dot);
  }
}

function setPlant(key,btn){
  currentPlant = plants[key];
  document.querySelectorAll('.state-btn:not(.phase-btn)').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function setPhase(phase,btn){
  currentPhase = phase;
  document.querySelectorAll('.phase-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  applyState();
}

function applyState(){
  var s = currentPlant;
  var ph = phases[currentPhase];
  var corr = correlationData[currentPhase];
  var r = document.documentElement;

  r.style.setProperty('--plant-color',s.color);
  r.style.setProperty('--plant-color-rgb',s.rgb);
  r.style.setProperty('--phase-accent',ph.accent);
  r.style.setProperty('--phase-accent-rgb',ph.accentRgb);

  ['a','i'].forEach(function(p){
    /* Connector */
    var conn = document.getElementById(p+'-conn');
    if(conn) conn.innerHTML = s.plant + ': ' + ph.speech[s.plant];

    /* Wheel */

    var wphase = document.getElementById(p+'-wphase');

    if(wphase) wphase.textContent = ph.label;
    renderWheel(p);

    var phtitle = document.getElementById(p+'-phtitle');
    var phbody = document.getElementById(p+'-phbody');
    if(phtitle) phtitle.textContent = ph.speech[s.plant];
    if(phbody){
      var bodyTexts = {
        folicular:'Sua '+s.plant+' ta energetica. Desafios maiores, bounce mais rapido, tom motivacional. <em>Bora aproveitar essa fase.</em>',
        ovulacao:'Sua '+s.plant+' te empodera. Confianca alta, conexao social, validacao interna. <em>Voce nao precisa de filtro.</em>',
        luteal:'Sua '+s.plant+' fica mais protetora. Animacoes 20% mais lentas, cuidado extra, validacao sem desafio. <em>Nao e fraqueza, e previsivel.</em>',
        menstrual:'Sua '+s.plant+' so oferece presenca. Minimo de demandas, conforto puro, resposta ultra-suave. <em>Hoje e so pra existir.</em>'
      };
      phbody.innerHTML = bodyTexts[currentPhase];
    }

    /* Adaptation cards */
    var adaptsEl = document.getElementById(p+'-adapts');
    if(adaptsEl){
      adaptsEl.innerHTML = '';
      ph.adaptCards.forEach(function(card){
        var html = '<div class="adapt-card">';
        html += '<div class="adapt-icon" style="background:'+card.bg+'">'+card.icon+'</div>';
        html += '<div><div class="adapt-label">'+card.label+'</div>';
        html += '<div class="adapt-desc">'+card.desc+'</div></div>';
        html += '</div>';
        adaptsEl.innerHTML += html;
      });
    }

    /* Data insights */
    var dataInsight = document.getElementById(p+'-datainsight');
    var dataSub = document.getElementById(p+'-datasub');
    if(dataInsight) dataInsight.innerHTML = corr.insight;
    if(dataSub) dataSub.textContent = corr.sub;

    /* Mini chart */
    var chart = document.getElementById(p+'-chart');
    if(chart){
      chart.innerHTML = '';
      var maxBar = Math.max.apply(null, corr.bars);
      var dayLabels = ['Seg','Ter','Qua','Qui','Sex','Sab','Dom'];
      corr.bars.forEach(function(val,idx){
        var bar = document.createElement('div');
        bar.className = 'mini-bar';
        bar.style.height = (val / maxBar * 100) + '%';
        if(idx >= corr.highlightRange[0] && idx <= corr.highlightRange[1]){
          bar.classList.add('highlight');
        }
        var label = document.createElement('div');
        label.className = 'mini-bar-label';
        label.textContent = dayLabels[idx];
        bar.appendChild(label);
        chart.appendChild(bar);
      });
    }

    /* Plant mini in phase icon */
    var phmini = document.getElementById(p+'-phmini');
    if(phmini){
      phmini.innerHTML = '<svg viewBox="0 0 80 80" fill="none">'
        +'<circle cx="40" cy="40" r="18" fill="'+s.color+'" opacity="0.25"/>'
        +'<circle cx="40" cy="40" r="10" fill="'+s.color+'" opacity="0.45"/>'
        +'<circle cx="37" cy="38" r="1.5" fill="#4A3728"/>'
        +'<circle cx="43" cy="38" r="1.5" fill="#4A3728"/>'
        +'<path d="M38 42C39 43.5 41 43.5 42 42" stroke="#4A3728" stroke-width="1" stroke-linecap="round" fill="none"/>'
        +'</svg>';
    }
  });
}
