<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brota — Mockup completo do app</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg-light:#FFF8F2; --bg-dark:#1A1315;
  --text-light:#3D2C2E; --text-dark:#F0E6E2;
  --brand-real:#F4A7B9; --brand-real-deep:#E8889E;
  --brand-ai:#A8D5A2; --brand-warning:#FFD07A;
  --shell-bg:rgba(61,44,46,0.06); --shell-border:rgba(61,44,46,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg-light);color:var(--text-light);transition:background .6s ease,color .6s ease;min-height:100vh;display:flex;flex-direction:column;}
body.dark{background:var(--bg-dark);color:var(--text-dark);--shell-bg:rgba(240,230,226,0.07);--shell-border:rgba(240,230,226,0.12);}
.hero{padding:26px 44px 18px;display:flex;justify-content:space-between;gap:28px;align-items:flex-start;flex-wrap:wrap;}
.hero-brand .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.16em;font-weight:700;opacity:.5;margin-bottom:6px;}
.hero-brand .title{font-size:clamp(28px,3.6vw,42px);font-weight:800;line-height:1;letter-spacing:-.02em;margin-bottom:8px;}
.hero-brand .title em{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:var(--brand-real-deep);}
.hero-brand .sub{font-size:13px;line-height:1.55;opacity:.72;max-width:560px;}
.hero-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-pill{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:999px;border:1.5px solid var(--shell-border);background:transparent;color:inherit;font:inherit;font-size:13px;font-weight:600;cursor:pointer;opacity:.9;transition:all .25s ease;}
.btn-pill:hover{opacity:1;transform:scale(1.03);border-color:var(--brand-real);}
.btn-pill .dot{width:12px;height:12px;border-radius:50%;background:var(--brand-real);transition:transform .4s;}
body.dark .btn-pill .dot{transform:rotate(180deg);background:var(--brand-warning);}
.tab-bar{position:sticky;top:0;z-index:50;padding:12px 44px;background:rgba(255,248,242,0.85);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid var(--shell-border);}
body.dark .tab-bar{background:rgba(26,19,21,0.85);}
.tab-bar-inner{display:flex;gap:6px;overflow-x:auto;padding:2px;scrollbar-width:thin;}
.tab{flex-shrink:0;display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:12px;border:1px solid transparent;background:transparent;color:inherit;font:inherit;font-size:12px;font-weight:600;cursor:pointer;opacity:.62;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
.tab:hover{opacity:1;background:var(--shell-bg);}
.tab .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--shell-bg);font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;}
.tab.active{background:var(--brand-real);color:#fff;opacity:1;box-shadow:0 4px 14px -4px rgba(232,136,158,.5);transform:translateY(-1px);}
.tab.active .num{background:rgba(255,255,255,.25);color:#fff;}
.tab-flow-label{flex-shrink:0;display:inline-flex;align-items:center;padding:0 10px 0 6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;opacity:.45;white-space:nowrap;border-left:1px solid var(--shell-border);margin-left:4px;}
.tab-flow-label:first-child{border-left:none;margin-left:0;}
.stage{position:relative;flex:1;display:flex;flex-direction:column;}
.frame-wrap{position:relative;flex:1;background:var(--shell-bg);border-top:1px solid var(--shell-border);}
.frame-wrap iframe{width:100%;height:100%;min-height:calc(100vh - 210px);border:none;display:block;background:var(--bg-light);transition:opacity .3s ease;}
body.dark .frame-wrap iframe{background:var(--bg-dark);}
.floating-nav{position:fixed;top:50%;z-index:40;transform:translateY(-50%);}
.floating-nav.prev{left:16px;} .floating-nav.next{right:16px;}
.floating-nav button{width:52px;height:52px;border-radius:50%;border:1px solid var(--shell-border);background:rgba(255,248,242,.9);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);color:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 22px -6px rgba(61,44,46,.18);}
body.dark .floating-nav button{background:rgba(26,19,21,.9);}
.floating-nav button:hover{transform:scale(1.08);border-color:var(--brand-real);}
.floating-nav button:disabled{opacity:.3;cursor:not-allowed;transform:scale(.95);}
.floating-nav button svg{width:22px;height:22px;}
.counter{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:40;padding:7px 16px;border-radius:999px;background:rgba(255,248,242,.9);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--shell-border);font-size:12px;font-weight:700;box-shadow:0 8px 22px -6px rgba(61,44,46,.18);}
body.dark .counter{background:rgba(26,19,21,.9);}
.counter b{color:var(--brand-real-deep);}
@media(max-width:720px){.hero{padding:18px 18px 12px;}.tab-bar{padding:10px 14px;}.floating-nav{display:none;}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<header class="hero">
  <div class="hero-brand">
    <div class="eyebrow">Brota · mockup completo</div>
    <h1 class="title">Brota <em>cresce com voce</em></h1>
    <p class="sub">60 telas em <strong>2 UIs nativas</strong> &mdash; Material 3 Expressive (Android) e Liquid Glass / HIG (iOS), lado a lado. Use as setas &larr; &rarr; do teclado para navegar.</p>
  </div>
  <div class="hero-controls">
    <button class="btn-pill" onclick="document.body.classList.toggle('dark')" aria-label="Alternar tema"><span class="dot"></span> Tema</button>
  </div>
</header>
<nav class="tab-bar" aria-label="Navegacao de telas"><div class="tab-bar-inner" id="tab-bar"></div></nav>
<div class="stage"><div class="frame-wrap"><iframe id="screen-frame" src="01-onboarding/00-splash.html" title="Tela atual" loading="eager"></iframe></div></div>
<div class="floating-nav prev"><button id="prev-btn" onclick="navTo(currentIdx-1)" aria-label="Anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button></div>
<div class="floating-nav next"><button id="next-btn" onclick="navTo(currentIdx+1)" aria-label="Proxima"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button></div>
<div class="counter"><span id="counter-cur">1</span> / 60 &middot; <b id="counter-flow">Onboarding</b></div>
<script>
const SCREENS=[
    { num: '01', flow: 'Onboarding', name: "Splash", file: '01-onboarding/00-splash.html' },
    { num: '02', flow: 'Onboarding', name: "Abertura", file: '01-onboarding/01-boasvindas.html' },
    { num: '03', flow: 'Onboarding', name: "Hook", file: '01-onboarding/02-hook.html' },
    { num: '04', flow: 'Onboarding', name: "Nome", file: '01-onboarding/03-nome.html' },
    { num: '05', flow: 'Onboarding', name: "Redes", file: '01-onboarding/04-redes.html' },
    { num: '06', flow: 'Onboarding', name: "Gatilhos", file: '01-onboarding/05-gatilhos.html' },
    { num: '07', flow: 'Onboarding', name: "Tempo", file: '01-onboarding/06-tempo.html' },
    { num: '08', flow: 'Onboarding', name: "Impacto", file: '01-onboarding/07-impacto.html' },
    { num: '09', flow: 'Onboarding', name: "Insights", file: '01-onboarding/08-insights.html' },
    { num: '10', flow: 'Onboarding', name: "Revelação da Planta", file: '01-onboarding/09-planta.html' },
    { num: '11', flow: 'Onboarding', name: "Semente Brota", file: '01-onboarding/10-brota.html' },
    { num: '12', flow: 'Onboarding', name: "Arquetipo da Planta", file: '01-onboarding/11-arquetipo.html' },
    { num: '13', flow: 'Onboarding', name: "Bonding", file: '01-onboarding/12-bonding.html' },
    { num: '14', flow: 'Onboarding', name: "Horario", file: '01-onboarding/13-horario.html' },
    { num: '15', flow: 'Onboarding', name: "Screen 14A: Ciclo Insight", file: '01-onboarding/14a-ciclo-insight.html' },
    { num: '16', flow: 'Onboarding', name: "Screen 14B: Ciclo Opt-in", file: '01-onboarding/14b-ciclo-optin.html' },
    { num: '17', flow: 'Onboarding', name: "Goal", file: '01-onboarding/15-goal.html' },
    { num: '18', flow: 'Onboarding', name: "Loading", file: '01-onboarding/16-loading.html' },
    { num: '19', flow: 'Onboarding', name: "Plano", file: '01-onboarding/17-plano.html' },
    { num: '20', flow: 'Onboarding', name: "Paywall V2 (Pastel/Warm)", file: '01-onboarding/18-paywall-v2.html' },
    { num: '21', flow: 'Pos-Paywall', name: "Momento", file: '02-pos-paywall/p1-momento.html' },
    { num: '22', flow: 'Pos-Paywall', name: "Mirror Setup + Quick Win", file: '02-pos-paywall/p2-shield-setup.html' },
    { num: '23', flow: 'Pos-Paywall', name: "Push Permission", file: '02-pos-paywall/p3-push.html' },
    { num: '24', flow: 'App', name: "Home", file: '03-app/a1-home.html' },
    { num: '25', flow: 'App', name: "Perfil", file: '03-app/a10-perfil.html' },
    { num: '26', flow: 'App', name: "Mirror 2.0", file: '03-app/a2-mirror.html' },
    { num: '27', flow: 'App', name: "Feed Cleanse", file: '03-app/a3-feedcleanse.html' },
    { num: '28', flow: 'App', name: "Inner Voice", file: '03-app/a4-innervoice.html' },
    { num: '29', flow: 'App', name: "Cycle Shield", file: '03-app/a5-cycleshield.html' },
    { num: '30', flow: 'App', name: "Jardim", file: '03-app/a6-jardim.html' },
    { num: '31', flow: 'App', name: "Pause", file: '03-app/a7-pause.html' },
    { num: '32', flow: 'App', name: "Insights", file: '03-app/a8-insights.html' },
    { num: '33', flow: 'App', name: "Grow Tab", file: '03-app/a9-grow.html' },
    { num: '34', flow: 'Empty States', name: "Home First Use", file: '04-empty-states/e1-home-firstuse.html' },
    { num: '35', flow: 'Empty States', name: "Feed Cleanse Intro", file: '04-empty-states/e2-feedcleanse-intro.html' },
    { num: '36', flow: 'Empty States', name: "Inner Voice First Session", file: '04-empty-states/e3-innervoice-first.html' },
    { num: '37', flow: 'Empty States', name: "CycleShield Empty", file: '04-empty-states/e4-cycleshield-empty.html' },
    { num: '38', flow: 'Empty States', name: "Insights Empty", file: '04-empty-states/e5-insights-empty.html' },
    { num: '39', flow: 'Empty States', name: "Grow Empty", file: '04-empty-states/e6-grow-empty.html' },
    { num: '40', flow: 'Empty States', name: "Jardim Empty", file: '04-empty-states/e7-jardim-empty.html' },
    { num: '41', flow: 'Features', name: "Feed Cleanse Day Active", file: '05-features/f1-feedcleanse-day.html' },
    { num: '42', flow: 'Features', name: "Plant Message", file: '05-features/f10-plant-message.html' },
    { num: '43', flow: 'Features', name: "Feed Cleanse Complete", file: '05-features/f2-feedcleanse-complete.html' },
    { num: '44', flow: 'Features', name: "Feed Cleanse Pause", file: '05-features/f3-feedcleanse-pause.html' },
    { num: '45', flow: 'Features', name: "Inner Voice CBT", file: '05-features/f4-innervoice-cbt.html' },
    { num: '46', flow: 'Features', name: "Inner Voice Luteal", file: '05-features/f5-innervoice-luteal.html' },
    { num: '47', flow: 'Features', name: "Inner Voice History", file: '05-features/f6-innervoice-history.html' },
    { num: '48', flow: 'Features', name: "Mirror Work Mode", file: '05-features/f7-mirror-workmode.html' },
    { num: '49', flow: 'Features', name: "Mirror Stats", file: '05-features/f8-mirror-stats.html' },
    { num: '50', flow: 'Features', name: "Mirror Permission", file: '05-features/f9-mirror-permission.html' },
    { num: '51', flow: 'Sistema', name: "System Error States", file: '06-system/sys-errors.html' },
    { num: '52', flow: 'Sistema', name: "Modais & Confirmacoes", file: '06-system/sys-modals.html' },
    { num: '53', flow: 'Trial', name: "Trial Ativo", file: '07-trial/t1-trial-active.html' },
    { num: '54', flow: 'Trial', name: "Trial Acabando", file: '07-trial/t2-trial-ending.html' },
    { num: '55', flow: 'Trial', name: "Trial Expired", file: '07-trial/t3-trial-expired.html' },
    { num: '56', flow: 'Trial', name: "Subscription Cancelled", file: '07-trial/t4-subscription-cancelled.html' },
    { num: '57', flow: 'Trial', name: "Winback", file: '07-trial/t5-winback.html' },
    { num: '58', flow: 'Notificacoes', name: "Notifications N1-N7", file: '08-notifications/n-notifications.html' },
    { num: '59', flow: 'Celebracoes', name: "Celebrations C1-C6", file: '09-celebrations/c-celebrations.html' },
    { num: '60', flow: 'Widgets', name: "W1-W2: Widgets", file: '10-widgets/w-widgets.html' },
];
let currentIdx=0;
function initFromHash(){const h=location.hash.replace('#','');const i=SCREENS.findIndex(s=>s.num===h);if(i>=0)currentIdx=i;}
function renderTabs(){let html='',last=null;SCREENS.forEach((s,i)=>{if(s.flow&&s.flow!==last){html+=`<span class="tab-flow-label">${s.flow}</span>`;last=s.flow;}html+=`<button class="tab" data-idx="${i}" onclick="navTo(${i})" role="tab"><span class="num">${s.num}</span><span>${s.name}</span></button>`;});document.getElementById('tab-bar').innerHTML=html;}
function navTo(idx){if(idx<0||idx>=SCREENS.length)return;currentIdx=idx;const s=SCREENS[idx];const fr=document.getElementById('screen-frame');fr.style.opacity='0';fr.src=s.file;fr.onload=()=>fr.style.opacity='1';document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));document.getElementById('prev-btn').disabled=idx===0;document.getElementById('next-btn').disabled=idx===SCREENS.length-1;document.getElementById('counter-cur').textContent=idx+1;document.getElementById('counter-flow').textContent=s.flow;history.replaceState(null,'','#'+s.num);const at=document.querySelector('.tab.active');if(at)at.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='ArrowLeft'){e.preventDefault();navTo(currentIdx-1);}else if(e.key==='ArrowRight'){e.preventDefault();navTo(currentIdx+1);}else if(e.key==='Home'){e.preventDefault();navTo(0);}else if(e.key==='End'){e.preventDefault();navTo(SCREENS.length-1);}});
addEventListener('hashchange',()=>{const h=location.hash.replace('#','');const i=SCREENS.findIndex(s=>s.num===h);if(i>=0&&i!==currentIdx)navTo(i);});
initFromHash();renderTabs();navTo(currentIdx);
</script>
</body>
</html>
